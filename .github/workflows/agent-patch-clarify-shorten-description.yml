name: Apply shorten description clarification

on:
  push:
    branches:
      - agent/clarify-shorten-description
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply focused patch once
        run: |
          if grep -q "Описание уже короче 190 символов" assets/js/app.js; then
            echo "Патч уже применён."
          else
            node tools/agent-patch-clarify-shorten-description.mjs
          fi

      - name: Validate project
        run: npm run validate

      - name: Verify UI actions in browser
        run: npm run smoke:ui-actions

      - name: Check diff
        run: git diff --check

      - name: Commit verified fix when needed
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/app.js tools/ui-actions-smoke.html data/ui-actions.json
          if git diff --cached --quiet; then
            echo "Проверенные изменения уже опубликованы."
            exit 0
          fi
          git commit -m "fix: clarify shorten description action"
          git push origin HEAD:${TARGET_BRANCH}

name: Apply layout file schema diagnostics

on:
  push:
    branches:
      - agent/layout-file-schema-diagnostics
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply focused patch once
        run: |
          if grep -q "parseLayoutFileText" assets/js/app.js; then
            echo "Патч уже применён."
          else
            node tools/agent-patch-layout-file-schema.mjs
          fi

      - name: Validate project
        run: npm run validate

      - name: Verify UI actions in browser
        id: ui_smoke
        continue-on-error: true
        run: npm run smoke:ui-actions

      - name: Show UI smoke failure
        if: steps.ui_smoke.outcome == 'failure'
        run: cat browser-smoke-failure.log || true

      - name: Upload UI smoke failure
        if: steps.ui_smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: layout-file-ui-smoke-failure
          path: browser-smoke-failure.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail after UI smoke
        if: steps.ui_smoke.outcome == 'failure'
        run: exit 1

      - name: Check diff
        run: git diff --check

      - name: Commit verified integration when needed
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/app.js data/ui-actions.json tools/ui-actions-smoke.html package.json docs/maintenance-guide.md
          if git diff --cached --quiet; then
            echo "Проверенные изменения уже опубликованы."
            exit 0
          fi
          git commit -m "feat: validate layout JSON files"
          git push origin HEAD:${TARGET_BRANCH}

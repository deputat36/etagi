name: Apply named layout conflict choice

on:
  push:
    branches:
      - agent/named-layout-conflict-choice
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply focused patch once
        run: |
          if grep -q "layoutConflictDialog" assets/js/app.js; then
            echo "Патч уже применён."
          else
            node tools/agent-patch-named-layout-conflict.mjs
          fi

      - name: Validate project
        run: npm run validate

      - name: Verify conflict choices in browser
        id: ui_smoke
        continue-on-error: true
        run: npm run smoke:ui-actions

      - name: Show browser failure
        if: steps.ui_smoke.outcome == 'failure'
        run: cat browser-smoke-failure.log || true

      - name: Upload browser failure
        if: steps.ui_smoke.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: named-layout-conflict-smoke-failure
          path: browser-smoke-failure.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail after browser smoke
        if: steps.ui_smoke.outcome == 'failure'
        run: exit 1

      - name: Check diff
        run: git diff --check

      - name: Commit verified fix when needed
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/app.js tools/ui-actions-smoke.html data/ui-actions.json
          if git diff --cached --quiet; then
            echo "Проверенные изменения уже опубликованы."
            exit 0
          fi
          git commit -m "fix: require named layout conflict choice"
          git push origin HEAD:${TARGET_BRANCH}

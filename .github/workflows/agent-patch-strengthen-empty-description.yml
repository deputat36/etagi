name: Apply strengthen text fix

on:
  push:
    branches:
      - agent/fix-strengthen-empty-description
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply focused patch
        run: node tools/agent-patch-strengthen-empty-description.mjs

      - name: Remove one-time patch helpers
        run: git rm tools/agent-patch-strengthen-empty-description.mjs .github/workflows/agent-patch-strengthen-empty-description.yml

      - name: Validate project
        run: npm run validate

      - name: Verify UI action in browser
        run: npm run smoke:ui-actions

      - name: Check diff
        run: git diff --check

      - name: Commit verified fix
        env:
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "OpenAI Agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/app.js tools/ui-actions-smoke.html data/ui-actions.json
          git commit -m "fix: explain empty strengthen action"
          git push origin HEAD:${TARGET_BRANCH}

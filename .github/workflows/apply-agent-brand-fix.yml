name: Apply agent brand identity fix

on:
  push:
    branches:
      - audit/ci-verification-2026-07-11
    paths:
      - '.github/workflows/apply-agent-brand-fix.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: audit/ci-verification-2026-07-11

      - name: Patch agent brand guard
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('assets/js/spnAgentBrandModeGuard.js')
          source = path.read_text(encoding='utf-8')
          old = """  if(changed) setStatus('Режим «Фото СПН»: фирменное оформление восстановлено после частного макета.');
          """
          new = """  const agentName = document.getElementById('agentName');
          if(agentName && agentName.value.trim()){
            agentName.dispatchEvent(new Event('input', {bubbles:true}));
          }

          if(changed) setStatus('Режим «Фото СПН»: фирменное оформление восстановлено после частного макета.');
          """
          if old not in source:
              raise SystemExit('Expected guard fragment not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove one-time workflow
        run: git rm .github/workflows/apply-agent-brand-fix.yml

      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/js/spnAgentBrandModeGuard.js
          git commit -m 'Sync agent name after private brand mode'
          git push origin HEAD:audit/ci-verification-2026-07-11

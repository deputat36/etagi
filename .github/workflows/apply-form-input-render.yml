name: Apply form input render split

on:
  pull_request:
    branches:
      - main
    paths:
      - '.agent/apply_form_input_render.py'
      - 'tools/form-input-render-smoke.html'
      - '.github/workflows/apply-form-input-render.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/split-form-input-render

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply focused migration
        run: python .agent/apply_form_input_render.py

      - name: Refresh runtime registry
        run: npm run runtime:registry

      - name: Validate project
        run: npm run validate

      - name: Verify UI actions smoke
        run: npm run smoke:ui-actions

      - name: Upload smoke failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: form-input-render-migration-failure
          path: browser-smoke-failure.log
          if-no-files-found: error
          retention-days: 3

      - name: Verify changed files
        run: |
          node --check assets/js/app.js
          node --check tools/run-ui-actions-smoke.mjs
          git diff --check

      - name: Commit verified changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add assets/js/app.js tools/run-ui-actions-smoke.mjs tools/form-input-render-smoke.html data/runtime-modules.json .agent/apply_form_input_render.py
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'perf: avoid template rebuild on ordinary form input'
            git push origin HEAD:agent/split-form-input-render
          fi

name: Apply full copy status language

on:
  pull_request:
    branches:
      - main
    paths:
      - '.agent/fix_full_copy_status_language.py'
      - '.github/workflows/apply-full-copy-status-language.yml'

permissions:
  contents: write

jobs:
  apply-language:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/clarify-save-and-transfer
          fetch-depth: 0

      - name: Apply language update
        run: python .agent/fix_full_copy_status_language.py

      - name: Validate update
        run: |
          node --check assets/js/spnWorkspaceBackup.js
          node --check tools/validate-workspace-backup.mjs
          node tools/validate-workspace-backup.mjs
          git diff --check -- . ':(exclude).agent/**'

      - name: Commit user-facing changes
        run: |
          rm -rf .agent
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: унифицировать язык полной копии"
          git push origin HEAD:agent/clarify-save-and-transfer

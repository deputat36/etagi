name: Apply newbie print maintenance check

on:
  pull_request:
    branches:
      - main
    paths:
      - '.agent/add_newbie_print_validation_to_maintenance.py'
      - '.github/workflows/apply-newbie-print-maintenance.yml'

permissions:
  contents: write

jobs:
  apply-maintenance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/simplify-newbie-print-step
          fetch-depth: 0

      - name: Update maintenance guide
        run: python .agent/add_newbie_print_validation_to_maintenance.py

      - name: Validate documentation
        run: |
          node tools/validate-newbie-print-simplification.mjs
          node tools/validate-package-scripts.mjs
          git diff --check -- . ':(exclude).agent/**'

      - name: Commit documentation
        run: |
          rm -rf .agent
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: добавить проверку печати новичка в регламент"
          git push origin HEAD:agent/simplify-newbie-print-step

name: Apply quick compact save

on:
  push:
    branches:
      - agent/quick-compact-save-transfer
    paths:
      - '.github/workflows/apply-quick-compact-save.yml'

permissions:
  contents: write

jobs:
  apply-change:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/quick-compact-save-transfer
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply exact migration
        run: python .agent/apply_quick_compact_save.py

      - name: Validate project and browser behavior
        run: |
          npm run validate
          npm run smoke:browser
          git diff --check

      - name: Commit verified change
        run: |
          git rm -r .agent .github/workflows/apply-quick-compact-save.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: добавить компактное сохранение в быстрый режим"
          git push origin HEAD:agent/quick-compact-save-transfer

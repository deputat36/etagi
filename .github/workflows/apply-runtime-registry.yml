name: Apply runtime module registry

on:
  push:
    branches:
      - agent/runtime-module-registry
    paths:
      - '.github/workflows/apply-runtime-registry.yml'

permissions:
  contents: write

jobs:
  build-registry:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/runtime-module-registry
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update scripts and guidance
        run: python .agent/apply_runtime_registry.py

      - name: Build registry
        run: node tools/build-runtime-module-registry.mjs

      - name: Validate registry and project
        run: |
          node tools/validate-runtime-module-registry.mjs
          npm run validate
          git diff --check

      - name: Commit verified registry
        run: |
          git rm -r .agent .github/workflows/apply-runtime-registry.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: добавить runtime registry модулей"
          git push origin HEAD:agent/runtime-module-registry

name: Apply runtime resource ownership

on:
  push:
    branches:
      - agent/runtime-resource-ownership
    paths:
      - 'tools/build-runtime-module-registry.mjs'
      - 'tools/validate-runtime-module-registry.mjs'
      - 'docs/runtime-module-registry.md'
      - 'data/runtime-modules.json'
      - '.github/workflows/apply-runtime-resource-ownership.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/runtime-resource-ownership

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build runtime ownership registry
        run: npm run runtime:registry

      - name: Validate ownership contract
        run: npm run validate:runtime-modules

      - name: Validate project
        run: npm run validate

      - name: Verify changed files
        run: |
          node --check tools/build-runtime-module-registry.mjs
          node --check tools/validate-runtime-module-registry.mjs
          git diff --check

      - name: Commit generated registry
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add data/runtime-modules.json
          if git diff --cached --quiet; then
            echo 'Registry already current.'
          else
            git commit -m 'docs: generate runtime resource ownership registry'
            git push origin HEAD:agent/runtime-resource-ownership
          fi

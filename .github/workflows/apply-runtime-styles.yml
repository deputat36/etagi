name: Apply runtime styles CSS migration

on:
  push:
    branches:
      - 'agent/move-quality-styles-to-css'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/move-quality-styles-to-css
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply CSS migration
        run: node tools/patch-runtime-styles-to-css.mjs

      - name: Rebuild runtime registry
        run: npm run runtime:registry

      - name: Remove one-off migration files
        run: rm tools/patch-runtime-styles-to-css.mjs .github/workflows/apply-runtime-styles.yml

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/js/spnInkEfficiency.js assets/js/spnPhotoLayoutQualityActions.js assets/js/spnTemplateKeyboard.js data/runtime-modules.json tools/patch-runtime-styles-to-css.mjs .github/workflows/apply-runtime-styles.yml
          git commit -m "style: перенести runtime styles в CSS"
          git push origin HEAD:agent/move-quality-styles-to-css

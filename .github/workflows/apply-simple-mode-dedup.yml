name: Apply simple mode deduplication

on:
  pull_request:
    branches:
      - main
    paths:
      - '.agent/apply_simple_mode_dedup.py'
      - '.github/workflows/apply-simple-mode-dedup.yml'

permissions:
  contents: write

jobs:
  apply-dedup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-simple-mode-task-duplicate
          fetch-depth: 0

      - name: Apply mode visibility update
        run: python .agent/apply_simple_mode_dedup.py

      - name: Validate mode visibility
        run: |
          node --check tools/validate-newbie-mode-docs.mjs
          npm run validate
          git diff --check -- . ':(exclude).agent/**'

      - name: Commit user-facing changes
        run: |
          rm -rf .agent
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: убрать повторный выбор задачи в простых режимах"
          git push origin HEAD:agent/remove-simple-mode-task-duplicate

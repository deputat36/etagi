name: Apply workflow scenario context

on:
  push:
    branches:
      - agent/workflow-scenario-context
    paths:
      - '.agent/**'
      - '.github/workflows/apply-workflow-scenario-context.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.agent/**'
      - '.github/workflows/apply-workflow-scenario-context.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/workflow-scenario-context
          fetch-depth: 0

      - name: Repair migration script
        run: python .agent/fix_workflow_path_replacement.py

      - name: Apply prepared change
        run: |
          set -o pipefail
          python .agent/apply_workflow_scenario_context.py 2>&1 | tee workflow-scenario-apply.log

      - name: Validate prepared files
        run: |
          set -o pipefail
          {
            node --check assets/js/app.js
            node --check assets/js/spnWizard.js
            node --check assets/js/spnUiMode.js
            node --check tools/validate-workflow-selection-audit.mjs
            node tools/validate-workflow-selection-audit.mjs
            git diff --check
          } 2>&1 | tee workflow-scenario-validation.log

      - name: Upload migration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-scenario-migration-failure
          path: |
            workflow-scenario-apply.log
            workflow-scenario-validation.log
          if-no-files-found: warn
          retention-days: 3

      - name: Commit final change
        run: |
          rm -rf .agent
          rm .github/workflows/apply-workflow-scenario-context.yml
          rm -f workflow-scenario-apply.log workflow-scenario-validation.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: связать ситуацию, сценарий и шаблон"
          git push origin HEAD:agent/workflow-scenario-context

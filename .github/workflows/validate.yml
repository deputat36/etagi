name: Validate project

on:
  push:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/**'
      - 'help/**'
      - 'docs/**'
      - 'tools/**'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/**'
      - 'help/**'
      - 'docs/**'
      - 'tools/**'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/validate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate project
        run: npm run validate

      - name: Upload validation failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-failure
          path: validation-failure.log
          if-no-files-found: warn
          retention-days: 3

  browser-smoke:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Browser smoke
        run: npm run smoke:browser

      - name: Upload browser smoke failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-failure
          path: browser-smoke-failure.log
          if-no-files-found: warn
          retention-days: 3

  print-screenshots:
    needs: browser-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate print screenshots
        run: npm run screenshots:print

      - name: Upload print screenshots
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: print-screenshots
          path: artifacts/print-screenshots/
          if-no-files-found: error
          retention-days: 7

      - name: Upload print screenshots failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: print-screenshots-failure
          path: print-screenshots-failure.log
          if-no-files-found: warn
          retention-days: 3

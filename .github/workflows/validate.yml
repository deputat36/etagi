name: Validate project

on:
  push:
    branches:
      - 'agent/unify-quality-list-observer'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-quality-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout working branch
        uses: actions/checkout@v4
        with:
          ref: agent/unify-quality-list-observer
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Patch app quality signal
        run: node tools/patch-app-quality-signal.mjs

      - name: Rebuild runtime registry
        run: npm run runtime:registry

      - name: Restore permanent workflow
        run: git show origin/main:.github/workflows/validate.yml > .github/workflows/validate.yml

      - name: Remove one-off patch script
        run: rm tools/patch-app-quality-signal.mjs

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/app.js data/runtime-modules.json .github/workflows/validate.yml tools/patch-app-quality-signal.mjs
          git commit -m "refactor: сообщать о завершении runQuality"
          git push origin HEAD:agent/unify-quality-list-observer

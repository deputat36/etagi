name: Validate project

on:
  push:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/**'
      - 'help/**'
      - 'docs/**'
      - 'tools/**'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/validate.yml'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/**'
      - 'help/**'
      - 'docs/**'
      - 'tools/**'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/validate.yml'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate project
        run: npm run validate

      - name: Verify release status details
        run: npm run test:release-status-details

      - name: Upload validation failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-failure
          path: validation-failure.log
          if-no-files-found: warn
          retention-days: 3

  cdp-failure-artifact:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify double CDP failure artifact
        run: npm run test:cdp-failure-artifact

      - name: Upload injected CDP failure artifact
        uses: actions/upload-artifact@v4
        with:
          name: cdp-failure-artifact
          path: print-screenshots-failure.log
          if-no-files-found: error
          retention-days: 3

  ui-actions-failure-artifact:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate UI actions failure artifact contract
        run: node tools/validate-ui-actions-failure-artifact.mjs

      - name: Verify UI actions failure artifact
        run: npm run test:ui-actions-failure-artifact

      - name: Upload injected UI actions failure artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-actions-failure-artifact
          path: browser-smoke-failure.log
          if-no-files-found: error
          retention-days: 3

  browser-smoke:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Browser smoke
        run: npm run smoke:browser

      - name: UI actions smoke
        run: npm run smoke:ui-actions

      - name: Upload browser smoke failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-smoke-failure
          path: browser-smoke-failure.log
          if-no-files-found: warn
          retention-days: 3

  print-screenshot:
    needs: browser-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - one-no-photo
          - two-big-phone
          - one-showcase
          - two-photo
          - four-contacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate print screenshot
        env:
          PRINT_SCREENSHOT_SCENARIO: ${{ matrix.scenario }}
        run: npm run screenshots:print

      - name: Upload print screenshot part
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: print-screenshot-${{ matrix.scenario }}
          path: artifacts/print-screenshots/
          if-no-files-found: error
          retention-days: 1

      - name: Upload print screenshot failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: print-screenshot-failure-${{ matrix.scenario }}
          path: print-screenshots-failure.log
          if-no-files-found: warn
          retention-days: 3

  collect-print-screenshots:
    needs: print-screenshot
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download print screenshot parts
        uses: actions/download-artifact@v4
        with:
          pattern: print-screenshot-*
          path: artifacts/print-screenshots/
          merge-multiple: true

      - name: Build print screenshot manifest
        run: npm run screenshots:manifest

      - name: Upload print screenshots
        uses: actions/upload-artifact@v4
        with:
          name: print-screenshots
          path: artifacts/print-screenshots/
          if-no-files-found: error
          retention-days: 7

name: Validate project

on:
  push:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/**'
      - 'help/**'
      - 'docs/**'
      - 'tools/**'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'assets/**'
      - 'data/**'
      - 'help/**'
      - 'docs/**'
      - 'tools/**'
      - 'README.md'
      - 'package.json'
      - '.github/workflows/validate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate project
        run: npm run validate

      - name: Upload validation failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-failure
          path: validation-failure.log
          if-no-files-found: warn
          retention-days: 3

  browser-smoke:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Browser smoke
        run: npm run smoke:browser

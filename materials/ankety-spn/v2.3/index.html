<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><title>Анкеты СПН v2.3</title><style>:root{--line:#777}*{box-sizing:border-box}body{margin:0;background:#ddd;color:#111;font-family:Arial,sans-serif}.toolbar{position:sticky;top:0;z-index:5;background:#111;color:#fff;padding:10px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}.toolbar button,.toolbar select{font:700 14px Arial;padding:8px 12px;border:0;border-radius:4px}.toolbar button{background:#e30613;color:#fff;cursor:pointer}.toolbar .secondary{background:#fff;color:#111}.status{margin-left:auto;font-size:13px}.stage{padding:16px}.paper{width:210mm;min-height:297mm;margin:0 auto 16px;background:#fff;box-shadow:0 2px 12px #777;padding:8mm 9mm}.block{border:1px solid var(--line);margin:0 0 2.2mm;break-inside:avoid}.row{display:grid;min-height:7mm;border-top:1px solid #aaa}.row:first-child{border-top:0}.row.c1{grid-template-columns:1fr}.row.c2{grid-template-columns:31% 69%}.row.c3{grid-template-columns:23% 49% 28%}.cell{padding:1.6mm 2mm;white-space:pre-wrap;font-size:9.2pt;line-height:1.25;border-left:1px solid #aaa}.cell:first-child{border-left:0}.title .cell{font-size:15pt;font-weight:900;text-align:center;line-height:1.2;padding:3mm;background:#111;color:#fff}.section .cell{background:#222;color:#fff;font-size:10.3pt;font-weight:900;padding:2mm}.guide .cell{background:#f4f4f4;font-size:8.5pt}.risk .cell{font-size:8.5pt}.memo .cell{background:#f6f6f6;font-size:8.7pt}.page-label{font-weight:900;font-size:8pt;text-align:right;color:#555;margin:-1mm 0 1mm}.legend{font-size:12px;color:#333;max-width:210mm;margin:0 auto 10px}@media print{body{background:#fff}.toolbar,.legend{display:none}.stage{padding:0}.paper{box-shadow:none;margin:0;width:210mm;height:297mm;min-height:297mm;page-break-after:always;padding:8mm 9mm}.paper:last-child{page-break-after:auto}.block{margin-bottom:2mm}.cell{font-size:8.8pt}.title .cell{font-size:14pt}}</style></head><body><div class="toolbar"><strong>Анкеты СПН v2.3</strong><select id="formSelect"></select><button id="printBtn">Печать / PDF</button><button id="copyBtn" class="secondary">Скопировать ссылку</button><span id="status" class="status"></span></div><div class="legend">Заполняйте по порядку. С — со слов, О — осмотр, Д — документ, Э — эксперт. Печать: A4, книжная ориентация, масштаб 100%.</div><main id="stage" class="stage"></main><script>let FORMS={};
async function loadForms(){
  const b64=(await fetch('forms.json.gz.b64',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Файл анкет не найден');return r.text()})).trim();
  const bin=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
  const ds=new DecompressionStream('gzip');
  const text=await new Response(new Blob([bin]).stream().pipeThrough(ds)).text();
  FORMS=JSON.parse(text);
}
function E(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function C(c,t,r,x){let k='row c'+c.length;if(t===0&&r===0)k+=' title';else if(/^(\d+\.|ЗАВЕРШЕНИЕ:|ПАМЯТКА|ПЕРЕД УХОДОМ|ЗАМЕТКИ)/.test(x))k+=' section';else if(t===1)k+=' guide';else if(x.includes('Вопрос / риск'))k+=' risk';else if(x.startsWith('□ Сверьте')||x.startsWith('□ Уточните')||x.startsWith('□ Проверьте'))k+=' memo';return k}
function T(a,t){const d=document.createElement('div');d.className='block';a.forEach((c,r)=>{const q=document.createElement('div'),x=c.join(' ');q.className=C(c,t,r,x);c.forEach(v=>{const e=document.createElement('div');e.className='cell';e.innerHTML=E(v).replace(/\s\|\s/g,'<br>').replace(/\n/g,'<br>');q.append(e)});d.append(q)});return d}
function R(){const f=FORMS[cur],st=document.getElementById('stage');document.title=f.title+' — анкета СПН v2.3';st.innerHTML='';[f.tables.slice(0,f.breakAfter),f.tables.slice(f.breakAfter)].forEach((a,p)=>{const s=document.createElement('section');s.className='paper';const l=document.createElement('div');l.className='page-label';l.textContent=f.title+' • v2.3 • лист '+(p+1)+' из 2';s.append(l);a.forEach((t,i)=>s.append(T(t,i+(p?f.breakAfter:0))));st.append(s)});document.getElementById('status').textContent='Версия 2.3 • 2 листа A4'}
let cur='apartment';
function I(){const q=new URLSearchParams(location.search),sel=document.getElementById('formSelect');cur=FORMS[q.get('form')]?q.get('form'):'apartment';Object.entries(FORMS).forEach(([k,f])=>{const o=document.createElement('option');o.value=k;o.textContent=f.title;sel.append(o)});sel.value=cur;sel.onchange=()=>{cur=sel.value;history.replaceState(null,'','?form='+encodeURIComponent(cur));R()};document.getElementById('printBtn').onclick=()=>print();document.getElementById('copyBtn').onclick=async()=>{try{await navigator.clipboard.writeText(location.href);document.getElementById('status').textContent='Ссылка скопирована'}catch{document.getElementById('status').textContent='Скопируйте адрес из строки браузера'}};R()}
loadForms().then(I).catch(e=>{document.getElementById('stage').innerHTML='<section class="paper"><h1>Не удалось загрузить анкеты</h1><p>'+E(e.message)+'</p></section>';});</script></body></html>

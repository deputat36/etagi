<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Etagi browser smoke</title>
  <style>
    body{font-family:Arial,sans-serif;margin:16px}
    #appFrame{width:1280px;height:900px;border:1px solid #cbd5e1}
    #browserSmokeResult{white-space:pre-wrap;padding:12px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc}
  </style>
</head>
<body>
  <pre id="browserSmokeResult" data-status="pending">Browser smoke is running…</pre>
  <iframe id="appFrame" title="Генератор расклеек"></iframe>
  <script>
    const result = document.getElementById('browserSmokeResult');
    const frame = document.getElementById('appFrame');
    const checks = [];
    const runtimeErrors = [];

    frame.addEventListener('load', async () => {
      const win = frame.contentWindow;
      const doc = frame.contentDocument;
      const earlyErrors = Array.isArray(win.__ETAGI_EARLY_ERRORS__) ? [...win.__ETAGI_EARLY_ERRORS__] : [];
      runtimeErrors.push(...earlyErrors);
      win.addEventListener('error', event => runtimeErrors.push(event.message || 'window error'));
      win.addEventListener('unhandledrejection', event => runtimeErrors.push(String(event.reason || 'unhandled rejection')));

      try {
        await waitFor(() => doc.querySelectorAll('.tpl-card').length > 0, 12000, 'шаблоны не появились');
        await waitFor(() => doc.querySelector('#printSheet .flyer'), 12000, 'предпросмотр А4 не появился');
        pass(`шаблонов: ${doc.querySelectorAll('.tpl-card').length}`);
        pass('предпросмотр А4 загружен');
        if(earlyErrors.length) throw new Error(`ранние runtime errors: ${earlyErrors.join(' | ')}`);
        pass('ранние runtime-ошибки не обнаружены');

        await waitFor(() => doc.body.dataset.spnUiMode === 'quick' && doc.getElementById('spnWizard'), 5000, 'быстрый режим или рабочие ситуации не готовы');
        const startCard = doc.querySelector('.start-card');
        const situationWizard = doc.getElementById('spnWizard');
        const densityFilter = doc.getElementById('templateDensityFilter');
        const helpCard = doc.querySelector('.help-card');
        const helpLinks = [...doc.querySelectorAll('.help-card .help-grid a')];
        const helpTips = doc.querySelector('.help-card .help-tips');
        assert(startCard && win.getComputedStyle(startCard).display === 'none', 'в быстром режиме повторно показан отдельный выбор задачи');
        assert(situationWizard && win.getComputedStyle(situationWizard).display !== 'none', 'в быстром режиме скрыт основной выбор рабочей ситуации');
        assert(densityFilter && win.getComputedStyle(densityFilter).display !== 'none', 'в быстром режиме ошибочно скрыт полезный фильтр плотности');
        assert(helpCard && win.getComputedStyle(helpCard).display === 'none', 'в быстром режиме показан справочный блок, создающий лишний перегруз');
        pass('режим Быстро: одна точка выбора через рабочую ситуацию');
        pass('режим Быстро: справочный блок скрыт');

        const postPrintWorkspace = await waitForElement(doc, '#spnPostPrintWorkspace', 6000, 'компактный блок После печати не появился');
        await waitFor(() => !postPrintWorkspace.open && postPrintWorkspace.dataset.wizardForced === 'false', 3000, 'блок После печати не закрылся по умолчанию');
        pass('После печати: исходно закрыт');

        const wizard = doc.getElementById('spnWizardFlow');
        await waitFor(() => wizard?.dataset.stepStatusBound === 'true', 6000, 'модуль статусов шагов не привязался к пошаговой подготовке');
        assert(wizard?.getAttribute('aria-label') === 'Пошаговая подготовка расклейки', 'не обновлена доступная подпись пошаговой подготовки');
        assert(wizard?.querySelector('.spn-wizard-flow-head b')?.textContent.trim() === 'Пошаговая подготовка', 'не обновлён заголовок пошаговой подготовки');
        const initialStepTitles = [...doc.querySelectorAll('#spnWizardFlow [data-wizard-step] b')].map(item => item.textContent.trim());
        assert(initialStepTitles[0] === '1. Задача и формат', 'первый шаг назван неоднозначно');
        assert(initialStepTitles[1] === '2. Шаблон', 'второй шаг не называется Шаблон');
        assert(initialStepTitles[4] === '5. Проверка и печать', 'пятый шаг не объясняет связь проверки и печати');
        assert(initialStepTitles[5] === '6. Сохранение', 'шестой шаг не называется Сохранение');
        assert(doc.getElementById('spnWizardToggle')?.textContent.trim() === 'Показывать по шагам', 'кнопка не объясняет действие включения пошагового показа');
        pass('пошаговая подготовка: понятные названия и действие переключателя');
        wizard.click();
        await waitFor(() => {
          const stepButtons = [...doc.querySelectorAll('#spnWizardFlow [data-wizard-step]')];
          return stepButtons.length === 8 && stepButtons.every(button => {
            const state = button.dataset.stepStatus;
            return button.querySelector('.spn-wizard-step-status') && ['ready', 'attention', 'optional', 'later'].includes(state);
          });
        }, 3000, 'компактные статусы восьми шагов не настроены');
        const progressSummary = doc.getElementById('spnWizardProgressSummary');
        assert(progressSummary?.querySelectorAll('[data-progress-phase]').length === 2, 'нет итогов До печати / После печати');
        assert(['true', 'false'].includes(progressSummary.dataset.beforeReady), 'итог До печати не содержит состояния готовности');
        assert(['true', 'false'].includes(progressSummary.dataset.afterReady), 'итог После печати не содержит состояния готовности');
        pass('статусы: восемь шагов и два общих итога');

        frame.style.width = '500px';
        await nextFrame(win);
        const mobileFontSize = selector => {
          const element = doc.querySelector(selector);
          assert(element, `не найдена мобильная подпись ${selector}`);
          return parseFloat(win.getComputedStyle(element).fontSize);
        };
        assert(mobileFontSize('.spn-wizard-step-status') >= 11, 'мобильный статус шага мельче 11 px');
        assert(mobileFontSize('.spn-wizard-print-count span') >= 11.5, 'мобильная подпись формата А4 мельче 11.5 px');
        assert(mobileFontSize('.spn-wizard-steps span') >= 11.5, 'мобильная подпись шага мельче 11.5 px');
        assert(mobileFontSize('.spn-wizard-progress-summary span') >= 11.5, 'мобильный итог этапа мельче 11.5 px');
        assert(mobileFontSize('.spn-office-template-card-note') >= 10.5, 'мобильная отметка сценария шаблона мельче 10.5 px');
        doc.body.dataset.templateMenuMode = 'compact';
        assert(mobileFontSize('.tpl-card .badge') >= 10.5, 'мобильный badge шаблона мельче 10.5 px');
        assert(mobileFontSize('.tpl-office-badge') >= 11, 'мобильная отметка риска шаблона мельче 11 px');
        frame.style.width = '1280px';
        await nextFrame(win);
        pass('mobile: важные рабочие подписи читаемы');

        setField(win, doc, '#qrLink', '');
        setCheckbox(doc, '#showPhoto', false);
        setCheckbox(doc, '#showQr', false);
        const mediaStep = doc.querySelector('[data-wizard-step="media"]');
        wizard.click();
        const mediaDebug = () => `showPhoto=${doc.getElementById('showPhoto')?.checked}; showQr=${doc.getElementById('showQr')?.checked}; qrLink=${doc.getElementById('qrLink')?.value || '—'}; state=${mediaStep?.dataset.stepStatus || '—'}; badge=${mediaStep?.querySelector('.spn-wizard-step-status')?.textContent || '—'}`;
        await waitFor(() => mediaStep?.dataset.stepStatus === 'optional' && mediaStep.querySelector('.spn-wizard-step-status')?.textContent === 'необязательно', 3000, () => `выключенные Фото / QR не стали необязательными (${mediaDebug()})`);
        pass('статусы: Фото / QR корректно стали необязательными');

        click(doc, '[data-spn-ui-mode="newbie"]');
        await waitFor(() => doc.body.dataset.spnUiMode === 'newbie', 3000, 'режим Новичок не включился');
        await waitFor(() => doc.body.dataset.wizardFlow === 'on', 5000, 'показ по шагам не включился автоматически');
        assert(doc.getElementById('spnWizardToggle')?.textContent.trim() === 'Показать все разделы', 'активная кнопка не объясняет возврат всех разделов');
        assert(win.getComputedStyle(startCard).display === 'none', 'в режиме Новичок повторно показан отдельный выбор задачи');
        assert(win.getComputedStyle(situationWizard).display !== 'none', 'в режиме Новичок скрыт выбор рабочей ситуации');
        assert(win.getComputedStyle(densityFilter).display === 'none', 'новичку показан фильтр плотности, который принудительно сбрасывается');
        assert(helpCard && win.getComputedStyle(helpCard).display !== 'none', 'новичку скрыта помощь');
        const visibleNewbieHelp = helpLinks.filter(link => win.getComputedStyle(link).display !== 'none');
        assert(visibleNewbieHelp.length === 2, `новичку показано ${visibleNewbieHelp.length} справочных ссылок вместо двух`);
        assert(visibleNewbieHelp.some(link => link.getAttribute('href') === 'help/quick-start.html'), 'новичку недоступен быстрый старт');
        assert(visibleNewbieHelp.some(link => link.getAttribute('href') === 'help/faq.html'), 'новичку недоступны вопросы и ответы');
        assert(helpTips && win.getComputedStyle(helpTips).display === 'none', 'новичку показан полный список справочных советов');
        pass('режим Новичок: повторная задача и лишняя плотность скрыты');
        pass('режим Новичок: компактная помощь доступна');
        pass('режим Новичок включён');
        pass('пошаговая подготовка включена автоматически');

        click(doc, '[data-wizard-step="check"]');
        await waitFor(() => doc.body.dataset.wizardStep === 'check', 2000, 'шаг Проверка не открылся');
        click(doc, '#spnWizardNext');
        await waitFor(() => doc.body.dataset.wizardStep === 'task', 3000, 'переход Проверка → Задание не выполнен');
        await waitFor(() => postPrintWorkspace.open && postPrintWorkspace.dataset.wizardForced === 'true' && win.getComputedStyle(postPrintWorkspace).display !== 'none', 3000, 'блок После печати не открылся на шаге Задание');
        pass('Проверка → Задание');
        pass('После печати: автоматически открыт для задания');

        setField(win, doc, '#distributionPlace', 'Северный микрорайон');
        setField(win, doc, '#distributionSheets', '20');
        const taskStep = doc.querySelector('[data-wizard-step="task"]');
        await waitFor(() => taskStep?.dataset.stepStatus === 'ready' && taskStep.querySelector('.spn-wizard-step-status')?.textContent === 'готово', 3000, 'заполненное задание не стало готовым');
        pass('статусы: задание стало готовым');

        click(doc, '#spnWizardNext');
        await waitFor(() => doc.body.dataset.wizardStep === 'report', 3000, 'переход Задание → Отчёт не выполнен');
        await waitFor(() => postPrintWorkspace.open && postPrintWorkspace.dataset.wizardForced === 'true', 3000, 'блок После печати не остался открытым на шаге Отчёт');
        pass('Задание → Отчёт');
        pass('После печати: открыт для отчёта');
        assert(doc.getElementById('spnDistributionTask'), 'блок задания отсутствует');
        assert(doc.getElementById('spnDistributionReport'), 'блок отчёта отсутствует');

        setField(win, doc, '#distributionReportDate', '2026-07-13');
        setField(win, doc, '#distributionReportPlace', 'Северный микрорайон');
        setField(win, doc, '#distributionReportSheets', '20');
        const reportStep = doc.querySelector('[data-wizard-step="report"]');
        reportStep.click();
        const reportDebug = () => `date=${doc.getElementById('distributionReportDate')?.value || '—'}; place=${doc.getElementById('distributionReportPlace')?.value || '—'}; sheets=${doc.getElementById('distributionReportSheets')?.value || '—'}; state=${reportStep?.dataset.stepStatus || '—'}; badge=${reportStep?.querySelector('.spn-wizard-step-status')?.textContent || '—'}`;
        await waitFor(() => reportStep?.dataset.stepStatus === 'ready' && ['заполнен', 'готово'].includes(reportStep.querySelector('.spn-wizard-step-status')?.textContent), 3000, () => `заполненный отчёт не стал готовым (${reportDebug()})`);
        await waitFor(() => progressSummary.dataset.afterReady === 'true', 3000, 'итог После печати не стал готовым');
        await waitFor(() => doc.getElementById('spnPostPrintWorkspaceStatus')?.textContent.includes('задание готово') && doc.getElementById('spnPostPrintWorkspaceStatus')?.textContent.includes('отчёт заполнен'), 3000, 'live-статус блока После печати не обновился');
        pass('статусы: отчёт и итог После печати готовы');
        pass('После печати: live-статус задания и отчёта готов');

        click(doc, '[data-spn-ui-mode="quick"]');
        await waitFor(() => doc.body.dataset.spnUiMode === 'quick', 2000, 'режим Быстро не включился');
        assert(win.getComputedStyle(startCard).display === 'none', 'после возврата в Быстро снова появился повторный выбор задачи');
        assert(win.getComputedStyle(densityFilter).display !== 'none', 'после возврата в Быстро фильтр плотности не восстановился');
        const advancedWorkbench = await waitForElement(doc, '#spnAdvancedWorkbench', 6000, 'группа дополнительной аналитики не появилась');
        await waitFor(() => win.getComputedStyle(advancedWorkbench).display === 'none', 2000, 'дополнительная аналитика не скрылась в режиме Быстро');
        click(doc, '[data-spn-ui-mode="advanced"]');
        await waitFor(() => doc.body.dataset.spnUiMode === 'advanced', 2000, 'режим Расширенно не включился');
        assert(win.getComputedStyle(startCard).display !== 'none', 'в расширенном режиме скрыт ручной выбор задачи');
        assert(win.getComputedStyle(densityFilter).display !== 'none', 'в расширенном режиме скрыт фильтр плотности');
        const visibleAdvancedHelp = helpLinks.filter(link => win.getComputedStyle(link).display !== 'none');
        assert(helpCard && win.getComputedStyle(helpCard).display !== 'none', 'в расширенном режиме скрыт центр помощи');
        assert(visibleAdvancedHelp.length === helpLinks.length && helpLinks.length >= 7, 'в расширенном режиме доступен не полный центр помощи');
        assert(helpTips && win.getComputedStyle(helpTips).display !== 'none', 'в расширенном режиме скрыты справочные советы');
        pass('режим Расширенно: ручная задача и фильтры доступны');
        pass('режим Расширенно: полный центр помощи доступен');
        await waitFor(() => win.getComputedStyle(advancedWorkbench).display !== 'none' && advancedWorkbench.querySelectorAll('.spn-advanced-workbench-body > .card').length === 3, 3000, 'три аналитических инструмента не собраны в один раздел');
        if(!advancedWorkbench.open) advancedWorkbench.querySelector('summary')?.click();
        await waitFor(() => advancedWorkbench.open, 2000, 'дополнительная аналитика не раскрылась');
        setField(win, doc, '#leadQuickNote', 'Тестовая заметка workbench');
        advancedWorkbench.querySelector('summary')?.click();
        await waitFor(() => !advancedWorkbench.open, 2000, 'дополнительная аналитика не закрылась');
        advancedWorkbench.querySelector('summary')?.click();
        await waitFor(() => advancedWorkbench.open && doc.getElementById('leadQuickNote')?.value === 'Тестовая заметка workbench', 2000, 'значение потеряно после повторного открытия аналитики');
        pass('Дополнительная аналитика: три инструмента сгруппированы и сохраняют значения');
        advancedWorkbench.querySelector('summary')?.click();
        await waitFor(() => !advancedWorkbench.open, 2000, 'дополнительная аналитика не вернулась в компактное состояние');
        await waitFor(() => postPrintWorkspace.dataset.wizardForced === 'false' && !postPrintWorkspace.open, 3000, 'после выхода из Новичка блок не вернулся в закрытое состояние');
        pass('режимы Быстро и Расширенно переключаются');
        pass('После печати: восстановлено закрытое состояние');
        postPrintWorkspace.querySelector('summary')?.click();
        await waitFor(() => postPrintWorkspace.open, 2000, 'блок После печати не раскрылся вручную');
        assert(postPrintWorkspace.contains(doc.getElementById('spnDistributionTask')), 'задание потеряно при группировке');
        assert(postPrintWorkspace.contains(doc.getElementById('spnDistributionReport')), 'отчёт потерян при группировке');
        pass('После печати: ручное раскрытие сохраняет рабочие разделы');
        await waitFor(() => doc.getElementById('spnWorkspaceBackup'), 3000, 'блок backup рабочего пространства не появился');
        pass('backup рабочего пространства доступен');

        const openFieldMode = doc.getElementById('openDistributionFieldModeBtn');
        const fieldDialog = doc.getElementById('spnDistributionFieldDialog');
        assert(openFieldMode, 'кнопка режима исполнителя отсутствует');
        assert(fieldDialog, 'диалог режима исполнителя отсутствует');
        openFieldMode.click();
        await waitFor(() => fieldDialog.open || fieldDialog.hasAttribute('open'), 2000, 'мобильный режим исполнителя не открылся');
        doc.getElementById('closeDistributionFieldModeBtn')?.click();
        await waitFor(() => !fieldDialog.open && !fieldDialog.hasAttribute('open'), 2000, 'мобильный режим исполнителя не закрылся');
        pass('мобильный режим исполнителя открывается');
        postPrintWorkspace.querySelector('summary')?.click();
        await waitFor(() => !postPrintWorkspace.open, 2000, 'блок После печати не закрылся вручную');

        await waitFor(() => {
          const buttons = [...doc.querySelectorAll('#layoutModeGrid [data-layout-mode]')];
          return buttons.length >= 10 && buttons.some(button => button.getAttribute('aria-checked') === 'true');
        }, 3000, 'ARIA-состояние компоновок не настроено');
        const layoutButtons = [...doc.querySelectorAll('#layoutModeGrid [data-layout-mode]')];
        const firstLayout = layoutButtons[0];
        const secondLayout = layoutButtons[1];
        const lastLayout = layoutButtons[layoutButtons.length - 1];
        firstLayout.focus();
        pressKey(win, firstLayout, 'End');
        await waitFor(() => lastLayout.classList.contains('active') && lastLayout.getAttribute('aria-checked') === 'true', 3000, 'End не выбрал последнюю компоновку');
        pass('keyboard: End выбрал последнюю компоновку');
        pressKey(win, lastLayout, 'Home');
        await waitFor(() => firstLayout.classList.contains('active') && firstLayout.getAttribute('aria-checked') === 'true', 3000, 'Home не вернул первую компоновку');
        assert(firstLayout.tabIndex === 0, 'выбранная компоновка должна иметь tabindex=0 и aria-checked="true"');
        pass('keyboard: Home вернул первую компоновку');
        pressKey(win, firstLayout, 'ArrowRight');
        await waitFor(() => secondLayout.classList.contains('active') && secondLayout.getAttribute('aria-checked') === 'true', 3000, 'ArrowRight не выбрал следующую компоновку');
        pass('keyboard: ArrowRight выбрал следующую компоновку');

        const facadeSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700"><rect width="1200" height="700" fill="#cbd5e1"/><rect x="140" y="120" width="920" height="480" fill="#e30613"/></svg>';
        const planSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800"><rect width="800" height="800" fill="white"/><path d="M80 80h640v640H80zM80 400h640M400 80v640" fill="none" stroke="#111827" stroke-width="24"/></svg>';
        const portraitSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="700" height="1100"><rect width="700" height="1100" fill="#e2e8f0"/><circle cx="350" cy="290" r="150" fill="#cbd5e1"/><path d="M120 1050c30-330 430-330 460 0" fill="#e30613"/></svg>';

        await attachImage(win, doc, '#photoOne', 'newbuild-facade.svg', facadeSvg);
        await attachImage(win, doc, '#photoTwo', 'newbuild-plan.svg', planSvg);
        await waitFor(() => doc.querySelector('#photoModeRow [data-photo="two"].active'), 3000, 'режим двух изображений не включился');
        mediaStep.click();
        await waitFor(() => mediaStep?.dataset.stepStatus === 'ready', 3000, 'загруженные фото не обновили статус медиа');
        pass('статусы: загруженные фото готовы');

        click(doc, '[data-count="1"]');
        click(doc, '[data-layout-mode="newbuild_visual"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-newbuild_visual.count-1 .photos.two'), 3000, 'newbuild_visual не построил 1 макет на А4');
        const planImage = doc.querySelector('.flyer.layout-newbuild_visual .photos.two .photo-box:nth-child(2) img');
        assert(planImage && win.getComputedStyle(planImage).objectFit === 'contain', 'планировка newbuild_visual может обрезаться');
        pass('newbuild_visual: 1 на А4 и планировка без обрезки');

        click(doc, '[data-count="4"]');
        click(doc, '[data-layout-mode="newbuild_visual"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-newbuild_visual.count-2'), 3000, 'newbuild_visual не ограничил результат до 2 на А4');
        pass('newbuild_visual: ограничение до 2 на А4');

        click(doc, '[data-photo="two"]');
        click(doc, '[data-count="1"]');
        click(doc, '[data-layout-mode="photo_left"]');
        const photoLeftFlyer = await waitForElement(doc, '.flyer.has-photo.layout-photo_left.count-1 .photos.two', 3000, 'photo_left не построил двухколоночный макет');
        const photoLeftStyle = win.getComputedStyle(photoLeftFlyer.closest('.flyer'));
        assert(photoLeftStyle.display === 'grid', 'photo_left должен использовать CSS grid');
        assert(photoLeftStyle.gridTemplateColumns.split(' ').length >= 2, 'photo_left не разделил фото и текст на две колонки');
        pass('photo_left: фото слева и текст справа');

        click(doc, '[data-count="4"]');
        click(doc, '[data-layout-mode="photo_left"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-photo_left.count-2'), 3000, 'photo_left не ограничил результат до 2 на А4');
        pass('photo_left: ограничение до 2 на А4');

        click(doc, '[data-photo="one"]');
        click(doc, '[data-count="1"]');
        click(doc, '[data-layout-mode="photo_card"]');
        const photoCardHeadline = await waitForElement(doc, '.flyer.has-photo.layout-photo_card.count-1:not(.photo-mode-plan) .headline', 3000, 'photo_card не создал заголовок поверх фотографии');
        const photoCardStyle = win.getComputedStyle(photoCardHeadline);
        assert(photoCardStyle.color === 'rgb(255, 255, 255)', 'photo_card должен выводить контрастный белый заголовок поверх фото');
        assert(photoCardStyle.backgroundImage !== 'none' || photoCardStyle.backgroundColor !== 'rgba(0, 0, 0, 0)', 'photo_card не создал контрастную подложку заголовка');
        pass('photo_card: контрастный заголовок поверх обычного фото');

        await attachImage(win, doc, '#photoOne', 'floor-plan.svg', planSvg);
        click(doc, '[data-photo="plan"]');
        click(doc, '[data-layout-mode="photo_card"]');
        const safePlanHeadline = await waitForElement(doc, '.flyer.has-photo.layout-photo_card.photo-mode-plan .headline', 3000, 'photo_card не переключился в безопасный режим планировки');
        const safePlanStyle = win.getComputedStyle(safePlanHeadline);
        const safePlanImage = doc.querySelector('.flyer.layout-photo_card.photo-mode-plan .photo-box img');
        assert(safePlanStyle.color !== 'rgb(255, 255, 255)', 'на планировке нельзя оставлять белый overlay-заголовок');
        assert(safePlanStyle.backgroundImage === 'none' && safePlanStyle.backgroundColor === 'rgba(0, 0, 0, 0)', 'на планировке нельзя оставлять затемняющую подложку заголовка');
        assert(safePlanImage && win.getComputedStyle(safePlanImage).objectFit === 'contain', 'планировка photo_card может обрезаться');
        pass('photo_card: планировка без overlay и обрезки');

        click(doc, '[data-count="4"]');
        click(doc, '[data-layout-mode="photo_card"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-photo_card.count-2'), 3000, 'photo_card не ограничил результат до 2 на А4');
        pass('photo_card: ограничение до 2 на А4');

        await attachImage(win, doc, '#photoOne', 'agent-portrait.svg', portraitSvg);
        setField(win, doc, '#agentName', 'Анна Качкина');
        click(doc, '[data-photo="one"]');
        click(doc, '[data-count="1"]');
        click(doc, '[data-layout-mode="private"]');
        await waitFor(() => doc.getElementById('colorMode')?.value === 'private' && !doc.getElementById('showBrand')?.checked, 3000, 'частный режим не отключил фирменность');
        click(doc, '[data-layout-mode="agent_brand_photo"]');
        await waitFor(() => doc.getElementById('colorMode')?.value === 'brand' && doc.getElementById('showBrand')?.checked, 3000, 'Фото СПН не восстановил фирменное оформление после частного режима');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-agent_brand_photo.count-1 .agent-brand-identity strong')?.textContent.includes('Анна Качкина'), 3000, 'agent_brand_photo не показал имя СПН');
        assert(doc.querySelector('.flyer.layout-agent_brand_photo .brand-row'), 'agent_brand_photo не показал фирменный блок после частного режима');
        const agentImage = doc.querySelector('.flyer.layout-agent_brand_photo .photo-box img');
        assert(agentImage && win.getComputedStyle(agentImage).objectFit === 'contain', 'портрет agent_brand_photo может обрезаться');
        pass('private → agent_brand_photo: фирменность восстановлена');
        pass('agent_brand_photo: 1 на А4, имя и портрет без обрезки');

        click(doc, '[data-count="4"]');
        click(doc, '[data-layout-mode="agent_brand_photo"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-agent_brand_photo.count-2'), 3000, 'agent_brand_photo не ограничил результат до 2 на А4');
        pass('agent_brand_photo: ограничение до 2 на А4');

        assert(!doc.querySelector('#spnWizardNext:disabled') || doc.body.dataset.wizardStep === 'report', 'кнопка Далее неожиданно заблокирована');
        if(runtimeErrors.length) throw new Error(`runtime errors: ${runtimeErrors.join(' | ')}`);

        result.dataset.status = 'passed';
        result.textContent = `PASSED\n${checks.map(item => `✓ ${item}`).join('\n')}`;
      }
      catch(error) {
        result.dataset.status = 'failed';
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ ${error.message || error}`;
      }
    }, {once:true});

    frame.src = '/index.html?smoke=1';

    window.setTimeout(() => {
      if(result.dataset.status === 'pending'){
        result.dataset.status = 'failed';
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ общий timeout smoke-теста`;
      }
    }, 65000);

    function pass(message){ checks.push(message); }
    function nextFrame(win){
      return new Promise(resolve => win.requestAnimationFrame(() => win.requestAnimationFrame(resolve)));
    }
    function assert(condition, message){ if(!condition) throw new Error(message); }
    function click(doc, selector){
      const element = doc.querySelector(selector);
      assert(element, `не найден элемент ${selector}`);
      element.click();
    }
    function pressKey(win, element, key){
      element.dispatchEvent(new win.KeyboardEvent('keydown', {key, bubbles:true, cancelable:true}));
    }
    async function attachImage(win, doc, selector, name, source){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      const alt = selector === '#photoTwo' ? 'Фото 2' : 'Фото 1';
      const previousSource = doc.querySelector(`#printSheet img[alt="${alt}"]`)?.src || '';
      const transfer = new win.DataTransfer();
      transfer.items.add(new win.File([source], name, {type:'image/svg+xml'}));
      input.files = transfer.files;
      input.dispatchEvent(new win.Event('change', {bubbles:true}));
      await waitFor(() => {
        const image = doc.querySelector(`#printSheet img[alt="${alt}"]`);
        return input.files?.length === 1 && image?.src && image.src !== previousSource;
      }, 3000, `не удалось отрисовать ${name}`);
    }
    function setField(win, doc, selector, value){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      input.value = value;
      input.dispatchEvent(new win.Event('input', {bubbles:true}));
      input.dispatchEvent(new win.Event('change', {bubbles:true}));
    }
    function setCheckbox(doc, selector, checked){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      if(input.checked !== checked) input.click();
    }
    async function waitForElement(doc, selector, timeout, message){
      let element = null;
      await waitFor(() => {
        element = doc.querySelector(selector);
        return element;
      }, timeout, message);
      return element;
    }
    async function waitFor(predicate, timeout, message){
      const started = Date.now();
      while(Date.now() - started < timeout){
        if(predicate()) return;
        await new Promise(resolve => setTimeout(resolve, 80));
      }
      throw new Error(typeof message === 'function' ? message() : message);
    }
  </script>
</body>
</html>

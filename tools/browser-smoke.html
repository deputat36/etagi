<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Etagi browser smoke</title>
  <style>
    body{font-family:Arial,sans-serif;margin:16px}
    #appFrame{width:1280px;height:900px;border:1px solid #cbd5e1}
    #browserSmokeResult{white-space:pre-wrap;padding:12px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc}
  </style>
</head>
<body>
  <pre id="browserSmokeResult" data-status="pending">Browser smoke is running…</pre>
  <iframe id="appFrame" title="Генератор расклеек"></iframe>
  <script>
    const result = document.getElementById('browserSmokeResult');
    const frame = document.getElementById('appFrame');
    const checks = [];
    const runtimeErrors = [];

    frame.addEventListener('load', async () => {
      const win = frame.contentWindow;
      const doc = frame.contentDocument;
      const earlyErrors = Array.isArray(win.__ETAGI_EARLY_ERRORS__) ? [...win.__ETAGI_EARLY_ERRORS__] : [];
      runtimeErrors.push(...earlyErrors);
      win.addEventListener('error', event => runtimeErrors.push(event.message || 'window error'));
      win.addEventListener('unhandledrejection', event => runtimeErrors.push(String(event.reason || 'unhandled rejection')));

      try {
        await waitFor(() => doc.querySelectorAll('.tpl-card').length > 0, 12000, 'шаблоны не появились');
        await waitFor(() => doc.querySelector('#printSheet .flyer'), 12000, 'предпросмотр А4 не появился');
        pass(`шаблонов: ${doc.querySelectorAll('.tpl-card').length}`);
        pass('предпросмотр А4 загружен');
        if(earlyErrors.length) throw new Error(`ранние runtime errors: ${earlyErrors.join(' | ')}`);
        pass('ранние runtime-ошибки не обнаружены');

        click(doc, '[data-spn-ui-mode="newbie"]');
        await waitFor(() => doc.body.dataset.spnUiMode === 'newbie', 3000, 'режим Новичок не включился');
        await waitFor(() => doc.body.dataset.wizardFlow === 'on', 5000, 'Wizard Flow не включился автоматически');
        pass('режим Новичок включён');
        pass('Wizard Flow включён автоматически');

        click(doc, '[data-wizard-step="check"]');
        await waitFor(() => doc.body.dataset.wizardStep === 'check', 2000, 'шаг Проверка не открылся');
        click(doc, '#spnWizardNext');
        await waitFor(() => doc.body.dataset.wizardStep === 'task', 3000, 'переход Проверка → Задание не выполнен');
        pass('Проверка → Задание');

        click(doc, '#spnWizardNext');
        await waitFor(() => doc.body.dataset.wizardStep === 'report', 3000, 'переход Задание → Отчёт не выполнен');
        pass('Задание → Отчёт');
        assert(doc.getElementById('spnDistributionTask'), 'блок задания отсутствует');
        assert(doc.getElementById('spnDistributionReport'), 'блок отчёта отсутствует');

        click(doc, '[data-spn-ui-mode="quick"]');
        await waitFor(() => doc.body.dataset.spnUiMode === 'quick', 2000, 'режим Быстро не включился');
        click(doc, '[data-spn-ui-mode="advanced"]');
        await waitFor(() => doc.body.dataset.spnUiMode === 'advanced', 2000, 'режим Расширенно не включился');
        pass('режимы Быстро и Расширенно переключаются');
        await waitFor(() => doc.getElementById('spnWorkspaceBackup'), 3000, 'блок backup рабочего пространства не появился');
        pass('backup рабочего пространства доступен');

        await waitFor(() => {
          const buttons = [...doc.querySelectorAll('#layoutModeGrid [data-layout-mode]')];
          return buttons.length >= 10 && buttons.some(button => button.getAttribute('aria-checked') === 'true');
        }, 3000, 'ARIA-состояние компоновок не настроено');
        const layoutButtons = [...doc.querySelectorAll('#layoutModeGrid [data-layout-mode]')];
        const firstLayout = layoutButtons[0];
        const secondLayout = layoutButtons[1];
        const lastLayout = layoutButtons[layoutButtons.length - 1];
        firstLayout.focus();
        pressKey(win, firstLayout, 'End');
        await waitFor(() => lastLayout.classList.contains('active') && lastLayout.getAttribute('aria-checked') === 'true', 3000, 'End не выбрал последнюю компоновку');
        pass('keyboard: End выбрал последнюю компоновку');
        pressKey(win, lastLayout, 'Home');
        await waitFor(() => firstLayout.classList.contains('active') && firstLayout.getAttribute('aria-checked') === 'true', 3000, 'Home не вернул первую компоновку');
        assert(firstLayout.tabIndex === 0, 'выбранная компоновка должна иметь tabindex=0 и aria-checked="true"');
        pass('keyboard: Home вернул первую компоновку');
        pressKey(win, firstLayout, 'ArrowRight');
        await waitFor(() => secondLayout.classList.contains('active') && secondLayout.getAttribute('aria-checked') === 'true', 3000, 'ArrowRight не выбрал следующую компоновку');
        pass('keyboard: ArrowRight выбрал следующую компоновку');

        await attachImage(win, doc, '#photoOne', 'newbuild-facade.svg', '<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700"><rect width="1200" height="700" fill="#cbd5e1"/><rect x="140" y="120" width="920" height="480" fill="#e30613"/></svg>');
        await attachImage(win, doc, '#photoTwo', 'newbuild-plan.svg', '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800"><rect width="800" height="800" fill="white"/><path d="M80 80h640v640H80zM80 400h640M400 80v640" fill="none" stroke="#111827" stroke-width="24"/></svg>');
        await waitFor(() => doc.querySelector('#photoModeRow [data-photo="two"].active'), 3000, 'режим двух изображений не включился');

        click(doc, '[data-count="1"]');
        click(doc, '[data-layout-mode="newbuild_visual"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-newbuild_visual.count-1 .photos.two'), 3000, 'newbuild_visual не построил 1 макет на А4');
        const planImage = doc.querySelector('.flyer.layout-newbuild_visual .photos.two .photo-box:nth-child(2) img');
        assert(planImage && win.getComputedStyle(planImage).objectFit === 'contain', 'планировка newbuild_visual может обрезаться');
        pass('newbuild_visual: 1 на А4 и планировка без обрезки');

        click(doc, '[data-count="4"]');
        click(doc, '[data-layout-mode="newbuild_visual"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-newbuild_visual.count-2'), 3000, 'newbuild_visual не ограничил результат до 2 на А4');
        pass('newbuild_visual: ограничение до 2 на А4');

        setField(win, doc, '#agentName', 'Анна Качкина');
        click(doc, '[data-photo="one"]');
        click(doc, '[data-count="1"]');
        click(doc, '[data-layout-mode="private"]');
        await waitFor(() => doc.getElementById('colorMode')?.value === 'private' && !doc.getElementById('showBrand')?.checked, 3000, 'частный режим не отключил фирменность');
        click(doc, '[data-layout-mode="agent_brand_photo"]');
        await waitFor(() => doc.getElementById('colorMode')?.value === 'brand' && doc.getElementById('showBrand')?.checked, 3000, 'Фото СПН не восстановил фирменное оформление после частного режима');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-agent_brand_photo.count-1 .agent-brand-identity strong')?.textContent.includes('Анна Качкина'), 3000, 'agent_brand_photo не показал имя СПН');
        assert(doc.querySelector('.flyer.layout-agent_brand_photo .brand-row'), 'agent_brand_photo не показал фирменный блок после частного режима');
        const agentImage = doc.querySelector('.flyer.layout-agent_brand_photo .photo-box img');
        assert(agentImage && win.getComputedStyle(agentImage).objectFit === 'contain', 'портрет agent_brand_photo может обрезаться');
        pass('private → agent_brand_photo: фирменность восстановлена');
        pass('agent_brand_photo: 1 на А4, имя и портрет без обрезки');

        click(doc, '[data-count="4"]');
        click(doc, '[data-layout-mode="agent_brand_photo"]');
        await waitFor(() => doc.querySelector('.flyer.has-photo.layout-agent_brand_photo.count-2'), 3000, 'agent_brand_photo не ограничил результат до 2 на А4');
        pass('agent_brand_photo: ограничение до 2 на А4');

        assert(!doc.querySelector('#spnWizardNext:disabled') || doc.body.dataset.wizardStep === 'report', 'кнопка Далее неожиданно заблокирована');
        if(runtimeErrors.length) throw new Error(`runtime errors: ${runtimeErrors.join(' | ')}`);

        result.dataset.status = 'passed';
        result.textContent = `PASSED\n${checks.map(item => `✓ ${item}`).join('\n')}`;
      }
      catch(error) {
        result.dataset.status = 'failed';
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ ${error.message || error}`;
      }
    }, {once:true});

    frame.src = '/index.html?smoke=1';

    window.setTimeout(() => {
      if(result.dataset.status === 'pending'){
        result.dataset.status = 'failed';
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ общий timeout smoke-теста`;
      }
    }, 18000);

    function pass(message){ checks.push(message); }
    function assert(condition, message){ if(!condition) throw new Error(message); }
    function click(doc, selector){
      const element = doc.querySelector(selector);
      assert(element, `не найден элемент ${selector}`);
      element.click();
    }
    function pressKey(win, element, key){
      element.dispatchEvent(new win.KeyboardEvent('keydown', {key, bubbles:true, cancelable:true}));
    }
    async function attachImage(win, doc, selector, name, source){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      const transfer = new win.DataTransfer();
      transfer.items.add(new win.File([source], name, {type:'image/svg+xml'}));
      input.files = transfer.files;
      input.dispatchEvent(new win.Event('change', {bubbles:true}));
      await waitFor(() => input.files?.length === 1, 1000, `не удалось загрузить ${name}`);
    }
    function setField(win, doc, selector, value){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      input.value = value;
      input.dispatchEvent(new win.Event('input', {bubbles:true}));
      input.dispatchEvent(new win.Event('change', {bubbles:true}));
    }
    async function waitFor(predicate, timeout, message){
      const started = Date.now();
      while(Date.now() - started < timeout){
        if(predicate()) return;
        await new Promise(resolve => setTimeout(resolve, 80));
      }
      throw new Error(message);
    }
  </script>
</body>
</html>

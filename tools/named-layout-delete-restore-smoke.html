<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Etagi named layout delete restore smoke</title>
  <style>body{font-family:Arial,sans-serif;margin:16px}iframe{width:1280px;height:900px;border:1px solid #cbd5e1}pre{white-space:pre-wrap;padding:12px;background:#f8fafc}</style>
</head>
<body>
  <pre id="uiActionsSmokeResult" data-status="pending">Named layout delete restore smoke is running…</pre>
  <iframe id="appFrame" title="Генератор расклеек"></iframe>
  <script>
    const LAYOUTS_KEY='etagi-raskleyka-layouts-v1';
    const DELETED_KEY='etagi-raskleyka-deleted-layout-v1';
    const result=document.getElementById('uiActionsSmokeResult');
    const frame=document.getElementById('appFrame');
    const checks=[];
    let lastAction='startup';
    localStorage.removeItem(LAYOUTS_KEY);
    localStorage.removeItem(DELETED_KEY);

    frame.addEventListener('load',async()=>{
      const win=frame.contentWindow;
      const doc=frame.contentDocument;
      try{
        await waitFor(()=>doc.querySelectorAll('.tpl-card').length>0,12000,'шаблоны не появились');
        await waitFor(()=>doc.getElementById('restoreDeletedLayoutBtn'),5000,'кнопка восстановления не появилась');
        click(doc,'[data-spn-ui-mode="advanced"]');
        await waitFor(()=>doc.body.dataset.spnUiMode==='advanced',2000,'расширенный режим не включился');
        await waitFor(()=>win.getComputedStyle(doc.querySelector('.save-card')).display!=='none',2000,'блок сохранения скрыт');
        assert(doc.getElementById('restoreDeletedLayoutBtn').disabled,'восстановление активно без удалённой записи');

        lastAction='restore.prepare';
        const deletedId=await saveLayout(win,doc,'Восстанавливаемый макет','Старый восстановимый заголовок','6 600 000 ₽');
        const neighborId=await saveLayout(win,doc,'Соседний макет','Соседний заголовок','3 300 000 ₽');
        setField(win,doc,'layoutName','Текущий лист после удаления');
        setField(win,doc,'headline','Текущий лист не менять');
        setField(win,doc,'price','1 ₽');
        const currentBeforeDelete=snapshotCurrent(doc);

        lastAction='restore.delete';
        await deleteLayout(doc,deletedId);
        await waitFor(()=>!hasLayout(win,deletedId),3000,'макет не удалён');
        const backup=readDeleted(win);
        assert(backup?.version===1,'резервная запись имеет неверную версию');
        assert(backup.item?.id===deletedId,'резервная запись содержит другой id');
        assert(backup.item?.state?.headline==='Старый восстановимый заголовок','резервная запись не содержит состояние удалённого макета');
        assert(hasLayout(win,neighborId),'удаление затронуло соседний макет');
        assertSameCurrent(doc,currentBeforeDelete,'удаление изменило текущий лист');
        const restoreButton=doc.getElementById('restoreDeletedLayoutBtn');
        assert(!restoreButton.disabled,'кнопка восстановления не активировалась');
        assert(restoreButton.textContent.includes('Восстанавливаемый макет'),'кнопка не показывает название удалённой записи');
        assert(doc.getElementById('restoreDeletedLayoutHint')?.textContent.includes('Восстановление не изменит текущий лист'),'подсказка восстановления непонятна');
        pass('восстановление: удалённая запись сохранена отдельно');

        lastAction='restore.basic';
        click(doc,'#restoreDeletedLayoutBtn');
        await waitFor(()=>hasLayout(win,deletedId),3000,'удалённый макет не восстановлен');
        assert(readDeleted(win)===null,'резервная запись не удалена после восстановления');
        assert(doc.getElementById('restoreDeletedLayoutBtn').disabled,'кнопка восстановления не отключилась');
        assert(doc.getElementById('savedLayouts')?.value===deletedId,'восстановленная запись не выбрана');
        assert(doc.activeElement?.id==='savedLayouts','фокус не переведён к восстановленной записи');
        assert(hasLayout(win,neighborId),'восстановление затронуло соседний макет');
        assertSameCurrent(doc,currentBeforeDelete,'восстановление записи изменило текущий лист');
        click(doc,'#loadNamedLayoutBtn');
        await waitFor(()=>doc.getElementById('headline')?.value==='Старый восстановимый заголовок',3000,'восстановленный макет не загрузился');
        assert(doc.getElementById('price')?.value==='6 600 000 ₽','восстановленный макет потерял цену');
        pass('восстановление: удалённый макет возвращён и загружается');

        lastAction='restore.conflict-delete';
        await deleteLayout(doc,deletedId);
        await waitFor(()=>readDeleted(win)?.item?.id===deletedId,3000,'повторное удаление не создало резервную запись');
        setField(win,doc,'layoutName','Восстанавливаемый макет');
        setField(win,doc,'headline','Новый макет с занятым названием');
        setField(win,doc,'price','9 900 000 ₽');
        click(doc,'#saveNamedLayoutBtn');
        await waitFor(()=>readLayouts(win).some(item=>item.name==='Восстанавливаемый макет'&&item.state?.headline==='Новый макет с занятым названием'),3000,'новый макет с исходным названием не сохранён');
        const newSameName=readLayouts(win).find(item=>item.name==='Восстанавливаемый макет');
        const currentBeforeConflictRestore=snapshotCurrent(doc);

        lastAction='restore.conflict';
        click(doc,'#restoreDeletedLayoutBtn');
        await waitFor(()=>readLayouts(win).some(item=>item.name==='Восстанавливаемый макет (восстановлен)'),3000,'конфликтный макет не восстановлен под уникальным названием');
        const restoredConflict=readLayouts(win).find(item=>item.name==='Восстанавливаемый макет (восстановлен)');
        assert(newSameName&&hasLayout(win,newSameName.id),'новый макет с занятым названием был перезаписан');
        assert(restoredConflict?.state?.headline==='Старый восстановимый заголовок','конфликтное восстановление вернуло неверное состояние');
        assert(readDeleted(win)===null,'конфликтная резервная запись не удалена после успеха');
        assert(doc.getElementById('savedLayouts')?.value===restoredConflict.id,'переименованная запись не выбрана');
        assert(doc.getElementById('statusLine')?.textContent.includes('потому что исходное название уже занято'),'нет объяснения переименования');
        assertSameCurrent(doc,currentBeforeConflictRestore,'конфликтное восстановление изменило текущий лист');
        click(doc,'#loadNamedLayoutBtn');
        await waitFor(()=>doc.getElementById('headline')?.value==='Старый восстановимый заголовок',3000,'переименованный восстановленный макет не загружается');
        pass('восстановление: конфликт имени создаёт отдельный безопасный макет');

        result.dataset.status='passed';
        result.textContent=`PASSED\n${checks.map(x=>`✓ ${x}`).join('\n')}`;
      }catch(error){
        result.dataset.status='failed';
        result.textContent=`FAILED\n${checks.map(x=>`✓ ${x}`).join('\n')}\n✗ ${error.message||error}\nПоследнее действие: ${lastAction}\nСостояние: ${JSON.stringify({status:doc.getElementById('statusLine')?.textContent,deleted:readDeleted(win),layouts:readLayouts(win),current:snapshotCurrent(doc),selected:doc.getElementById('savedLayouts')?.value})}`;
      }
    },{once:true});

    frame.src='/index.html?smoke=named-layout-delete-restore';
    setTimeout(()=>{if(result.dataset.status==='pending'){result.dataset.status='failed';result.textContent=`FAILED\n✗ timeout\nПоследнее действие: ${lastAction}`;}},36000);

    async function saveLayout(win,doc,name,headline,price){
      setField(win,doc,'layoutName',name);setField(win,doc,'headline',headline);setField(win,doc,'price',price);click(doc,'#saveNamedLayoutBtn');
      await waitFor(()=>readLayouts(win).some(item=>item.name===name&&item.state?.headline===headline),3000,`макет ${name} не сохранён`);
      return readLayouts(win).find(item=>item.name===name&&item.state?.headline===headline).id;
    }
    async function deleteLayout(doc,id){
      const select=doc.getElementById('savedLayouts');select.value=id;assert(select.value===id,`не выбран ${id}`);click(doc,'#deleteNamedLayoutBtn');
      await waitFor(()=>doc.getElementById('namedLayoutDeleteDialog')?.open,1000,'диалог удаления не открыт');click(doc,'#confirmNamedLayoutDeleteBtn');
    }
    function readLayouts(win){try{return JSON.parse(win.localStorage.getItem(LAYOUTS_KEY)||'[]')}catch{return[]}}
    function readDeleted(win){try{return JSON.parse(win.localStorage.getItem(DELETED_KEY)||'null')}catch{return null}}
    function hasLayout(win,id){return readLayouts(win).some(item=>item.id===id)}
    function snapshotCurrent(doc){return{layoutName:doc.getElementById('layoutName')?.value||'',headline:doc.getElementById('headline')?.value||'',price:doc.getElementById('price')?.value||'',flyers:doc.querySelectorAll('#printSheet .flyer').length}}
    function assertSameCurrent(doc,expected,message){assert(JSON.stringify(snapshotCurrent(doc))===JSON.stringify(expected),message)}
    function setField(win,doc,id,value){const input=doc.getElementById(id);assert(input,`не найден #${id}`);input.value=value;input.dispatchEvent(new win.Event('input',{bubbles:true}));input.dispatchEvent(new win.Event('change',{bubbles:true}))}
    function click(doc,selector){const el=doc.querySelector(selector);assert(el,`не найден ${selector}`);el.click()}
    function pass(text){checks.push(text)}
    function assert(value,message){if(!value)throw new Error(message)}
    async function waitFor(fn,timeout,message){const start=Date.now();while(Date.now()-start<timeout){if(fn())return;await new Promise(r=>setTimeout(r,40))}throw new Error(message)}
  </script>
</body>
</html>

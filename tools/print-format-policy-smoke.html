<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Etagi print format policy smoke</title>
  <style>body{font-family:Arial,sans-serif;margin:16px}#appFrame{width:1280px;height:900px;border:1px solid #cbd5e1}#storageFrame{display:none}pre{white-space:pre-wrap;padding:12px;background:#f8fafc}</style>
</head>
<body>
  <pre id="uiActionsSmokeResult" data-status="pending">Print format policy smoke is running…</pre>
  <iframe id="storageFrame" title="Проверка хранения"></iframe>
  <iframe id="appFrame" title="Генератор расклеек"></iframe>
  <script>
    const result=document.getElementById('uiActionsSmokeResult');
    const storageFrame=document.getElementById('storageFrame');
    const frame=document.getElementById('appFrame');
    const checks=[];
    let lastAction='policy.local-normalization';

    storageFrame.addEventListener('load',async()=>{
      try{
        const fixture=storageFrame.contentDocument?.getElementById('storageFixtureResult');
        await waitFor(()=>fixture?.dataset.status&&fixture.dataset.status!=='pending',4000,'storage fixture не завершился');
        assert(fixture.dataset.status==='passed',`старый autosave не нормализован: ${fixture.textContent||'нет результата'}`);
        const loaded=JSON.parse(fixture.textContent||'null');
        assert(loaded?.printCount===2,'старый формат не нормализован до 2 на А4');
        assert(loaded?.layoutName==='Старый локальный макет','нормализация потеряла название макета');
        assert(loaded?.headline==='Старый формат должен нормализоваться','нормализация потеряла заголовок макета');
        assert(loaded?.price==='5 500 000 ₽','нормализация потеряла цену макета');
        pass('A4: старые локальные 10/12 нормализуются до 2 без потери текста');
        frame.src='/index.html?smoke=print-format-policy';
      }catch(error){ fail(error); }
    },{once:true});

    frame.addEventListener('load',async()=>{
      if(!frame.getAttribute('src')||result.dataset.status!=='pending') return;
      const win=frame.contentWindow;
      const doc=frame.contentDocument;
      try{
        await waitFor(()=>doc.querySelectorAll('[data-count]').length>0,8000,'кнопки форматов не появились');
        await waitFor(()=>doc.querySelectorAll('#printSheet .flyer').length>0,8000,'предпросмотр не появился');

        lastAction='policy.buttons';
        const counts=[...doc.querySelectorAll('#printPresetRow [data-count]')].map(button=>Number(button.dataset.count));
        assert(JSON.stringify(counts)===JSON.stringify([1,2,3,4,6,8]),`в UI неверный список форматов: ${counts.join(',')}`);
        assert(!doc.querySelector('[data-count="10"]')&&!doc.querySelector('[data-count="12"]'),'в UI появились неподдерживаемые 10/12');
        pass('A4: интерфейс показывает только 1, 2, 3, 4, 6 и 8');

        lastAction='policy.prepare-current';
        setField(win,doc,'#layoutName','Текущий защищённый макет');
        setField(win,doc,'#headline','Текущий заголовок должен сохраниться');
        setField(win,doc,'#price','7 700 000 ₽');
        click(doc,'[data-count="4"]');
        await waitFor(()=>doc.querySelectorAll('#printSheet .flyer').length===4,2000,'не подготовлены 4 копии перед отказом импорта');
        const before=snapshot(doc);

        for(const unsupported of [10,12]){
          lastAction=`policy.reject-${unsupported}`;
          await setFile(win,doc,'#uploadFile',`unsupported-${unsupported}.json`,JSON.stringify({
            headline:`Чужой формат ${unsupported}`,price:'1 ₽',printCount:unsupported
          }),'application/json');
          await waitFor(()=>doc.getElementById('statusLine')?.textContent.includes(`Значение «${unsupported}» не поддерживается`),2500,`нет точной диагностики формата ${unsupported}`);
          await waitFor(()=>doc.getElementById('uploadFile')?.files?.length===0,1000,`file input не сброшен после ${unsupported}`);
          assert(doc.getElementById('statusLine')?.textContent.includes('1, 2, 3, 4, 6, 8'),'диагностика не перечисляет официальные форматы');
          assert(JSON.stringify(snapshot(doc))===JSON.stringify(before),`импорт ${unsupported} изменил текущий макет`);
        }
        pass('A4: импорт 10 и 12 отклоняется без изменения макета');

        lastAction='policy.renderer-module';
        const renderModule=await import('/assets/js/render.js');
        const grid10=renderModule.getGrid(10,'grid');
        const grid12=renderModule.getGrid(12,'grid');
        assert(grid10.cols===1&&grid10.rows===2&&grid12.cols===1&&grid12.rows===2,'renderer не использует безопасный fallback для 10/12');
        pass('A4: renderer защищён от неподдерживаемого состояния');

        lastAction='completed';
        result.dataset.status='passed';
        result.textContent=`PASSED\n${checks.map(item=>`✓ ${item}`).join('\n')}`;
      }catch(error){ fail(error,doc); }
    });

    storageFrame.src='/tools/print-format-storage-fixture.html';
    setTimeout(()=>{if(result.dataset.status==='pending') fail(new Error('timeout'));},28000);

    function snapshot(doc){return{
      layoutName:doc?.getElementById('layoutName')?.value||'',headline:doc?.getElementById('headline')?.value||'',price:doc?.getElementById('price')?.value||'',
      activeCount:doc?.querySelector('#printPresetRow [data-count].active')?.dataset.count||'',flyers:doc?.querySelectorAll('#printSheet .flyer').length||0,
      sheetClass:doc?.getElementById('printSheet')?.className||''
    }}
    function fail(error,doc){result.dataset.status='failed';result.dataset.lastAction=lastAction;result.textContent=`FAILED\n${checks.map(item=>`✓ ${item}`).join('\n')}\n✗ ${error.message||error}\nПоследнее действие: ${lastAction}\nСостояние: ${JSON.stringify(snapshot(doc))}`}
    function setField(win,doc,selector,value){const input=doc.querySelector(selector);assert(input,`не найден ${selector}`);input.value=value;input.dispatchEvent(new win.Event('input',{bubbles:true}));input.dispatchEvent(new win.Event('change',{bubbles:true}))}
    function click(doc,selector){const element=doc.querySelector(selector);assert(element,`не найден ${selector}`);element.click()}
    async function setFile(win,doc,selector,name,content,type){const input=doc.querySelector(selector);assert(input,`не найден ${selector}`);const transfer=new win.DataTransfer();transfer.items.add(new win.File([content],name,{type}));input.files=transfer.files;input.dispatchEvent(new win.Event('change',{bubbles:true}));await waitFor(()=>input.files?.length===1,1000,`файл ${name} не выбран`)}
    function pass(message){checks.push(message)}
    function assert(condition,message){if(!condition)throw new Error(message)}
    async function waitFor(check,timeout,message){const started=Date.now();while(Date.now()-started<timeout){if(check())return;await new Promise(resolve=>setTimeout(resolve,40))}throw new Error(message)}
  </script>
</body>
</html>

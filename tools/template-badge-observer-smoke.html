<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Etagi template badge observer smoke</title>
  <style>
    body{font-family:Arial,sans-serif;margin:16px}
    #appFrame{width:1280px;height:900px;border:1px solid #cbd5e1}
    #uiActionsSmokeResult{white-space:pre-wrap;padding:12px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc}
  </style>
</head>
<body>
  <pre id="uiActionsSmokeResult" data-status="pending">Template badge observer smoke is running…</pre>
  <iframe id="appFrame" title="Генератор расклеек"></iframe>
  <script>
    const result = document.getElementById('uiActionsSmokeResult');
    const frame = document.getElementById('appFrame');
    const checks = [];
    const runtimeErrors = [];
    let lastAction = 'startup';

    frame.addEventListener('load', async () => {
      const win = frame.contentWindow;
      const doc = frame.contentDocument;
      runtimeErrors.push(...(Array.isArray(win.__ETAGI_EARLY_ERRORS__) ? win.__ETAGI_EARLY_ERRORS__ : []));
      win.addEventListener('error', event => runtimeErrors.push(event.message || 'window error'));
      win.addEventListener('unhandledrejection', event => runtimeErrors.push(String(event.reason || 'unhandled rejection')));

      let originalQuerySelectorAll = null;
      try{
        await waitFor(() => doc.querySelectorAll('#templateList .tpl-card').length >= 4, 12000, 'карточки шаблонов не появились');
        await waitFor(() => doc.querySelector('#templateList .tpl-card-office-badges'), 12000, 'бейджи шаблонов не появились');
        await delay(900);

        const list = doc.getElementById('templateList');
        const firstCard = list?.querySelector('.tpl-card');
        assert(list && firstCard, 'не найден список или карточка шаблона');
        assertNoDuplicateBadges(doc);
        pass('бейджи добавлены без дублей при начальной загрузке');

        let badgeEnhancePasses = 0;
        originalQuerySelectorAll = doc.querySelectorAll.bind(doc);
        doc.querySelectorAll = function(selector){
          if(selector === '.tpl-card') badgeEnhancePasses += 1;
          return originalQuerySelectorAll(selector);
        };
        await delay(150);
        badgeEnhancePasses = 0;

        lastAction = 'template-badges.descendant-mutation';
        const marker = doc.createElement('span');
        marker.className = 'template-badge-descendant-smoke';
        marker.textContent = 'marker';
        firstCard.append(marker);
        await delay(300);
        assert(badgeEnhancePasses === 0, `внутренняя мутация запустила повторный обход карточек: ${badgeEnhancePasses}`);
        marker.remove();
        assertNoDuplicateBadges(doc);
        pass('внутренние изменения карточки не запускают повторный badge-обход');

        lastAction = 'template-badges.structural-rebuild';
        badgeEnhancePasses = 0;
        const currentGoal = doc.querySelector('[data-goal].active')?.dataset.goal || '';
        const nextGoal = [...doc.querySelectorAll('[data-goal]')].find(button => button.dataset.goal !== currentGoal && !button.disabled);
        assert(nextGoal, 'не найдена другая задача для структурной проверки');
        nextGoal.click();
        await waitFor(() => !firstCard.isConnected, 3500, 'смена задачи не заменила карточки шаблонов');
        await waitFor(() => badgeEnhancePasses > 0, 3500, 'observer не обработал замену карточек верхнего уровня');
        await waitFor(() => doc.querySelector('#templateList .tpl-card-office-badges'), 3500, 'после перестройки не восстановились бейджи');
        assertNoDuplicateBadges(doc);
        pass('замена карточек верхнего уровня по-прежнему восстанавливает бейджи');

        doc.querySelectorAll = originalQuerySelectorAll;
        originalQuerySelectorAll = null;
        if(runtimeErrors.length) throw new Error(`runtime errors: ${runtimeErrors.join(' | ')}`);
        lastAction = 'completed';
        result.dataset.status = 'passed';
        result.textContent = `PASSED\n${checks.map(item => `✓ ${item}`).join('\n')}`;
      } catch(error){
        if(originalQuerySelectorAll) doc.querySelectorAll = originalQuerySelectorAll;
        result.dataset.status = 'failed';
        result.dataset.lastAction = lastAction;
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ ${error.message || error}\nПоследнее действие: ${lastAction}\nСостояние: ${JSON.stringify(snapshot(doc))}`;
      }
    }, {once:true});

    frame.src = '/index.html?smoke=template-badge-observer';

    window.setTimeout(() => {
      if(result.dataset.status === 'pending'){
        result.dataset.status = 'failed';
        result.dataset.lastAction = lastAction;
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ timeout template badge observer smoke\nПоследнее действие: ${lastAction}`;
      }
    }, 24000);

    function assertNoDuplicateBadges(doc){
      const cards = [...doc.querySelectorAll('#templateList .tpl-card')];
      assert(cards.length > 0, 'карточки шаблонов отсутствуют');
      assert(cards.some(card => card.querySelector('.tpl-card-office-badges')), 'ни на одной карточке нет бейджей');
      assert(cards.every(card => card.querySelectorAll('.tpl-card-office-badges').length <= 1), 'найдены дубли блоков бейджей');
      assert(cards.every(card => card.querySelectorAll('.tpl-card-office-reason').length <= 1), 'найдены дубли пояснений шаблона');
    }
    function snapshot(doc){
      return {
        status:doc.getElementById('statusLine')?.textContent || '',
        cards:doc.querySelectorAll('#templateList .tpl-card').length,
        badgeBlocks:doc.querySelectorAll('#templateList .tpl-card-office-badges').length,
        reasons:doc.querySelectorAll('#templateList .tpl-card-office-reason').length
      };
    }
    function pass(message){ checks.push(message); }
    function assert(condition, message){ if(!condition) throw new Error(message); }
    function delay(ms){ return new Promise(resolve => setTimeout(resolve, ms)); }
    function waitFor(check, timeoutMs, message){
      const started = Date.now();
      return new Promise((resolve, reject) => {
        const tick = () => {
          try{ if(check()) return resolve(); } catch(error){ return reject(error); }
          if(Date.now() - started >= timeoutMs) return reject(new Error(message));
          setTimeout(tick, 50);
        };
        tick();
      });
    }
  </script>
</body>
</html>

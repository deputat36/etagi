<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Etagi UI actions smoke</title>
  <style>
    body{font-family:Arial,sans-serif;margin:16px}
    #appFrame{width:1280px;height:900px;border:1px solid #cbd5e1}
    #uiActionsSmokeResult{white-space:pre-wrap;padding:12px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc}
  </style>
</head>
<body>
  <pre id="uiActionsSmokeResult" data-status="pending">UI actions smoke is running…</pre>
  <iframe id="appFrame" title="Генератор расклеек"></iframe>
  <script>
    const result = document.getElementById('uiActionsSmokeResult');
    const frame = document.getElementById('appFrame');
    const checks = [];
    const runtimeErrors = [];
    let lastAction = 'startup';

    frame.addEventListener('load', async () => {
      const win = frame.contentWindow;
      const doc = frame.contentDocument;
      const earlyErrors = Array.isArray(win.__ETAGI_EARLY_ERRORS__) ? [...win.__ETAGI_EARLY_ERRORS__] : [];
      runtimeErrors.push(...earlyErrors);
      win.addEventListener('error', event => runtimeErrors.push(event.message || 'window error'));
      win.addEventListener('unhandledrejection', event => runtimeErrors.push(String(event.reason || 'unhandled rejection')));

      try {
        await waitFor(() => doc.querySelectorAll('.tpl-card').length > 0, 12000, 'шаблоны не появились');
        await waitFor(() => doc.querySelector('#printSheet .flyer'), 12000, 'предпросмотр А4 не появился');
        await waitFor(() => doc.getElementById('contactCtaText') && doc.getElementById('tearOffLabel') && doc.getElementById('brandNameText') && doc.getElementById('brandSideText'), 5000, 'редакторы служебных подписей не появились');
        win.localStorage.removeItem('etagi-raskleyka-profile-v1');
        win.localStorage.removeItem('etagi-raskleyka-saved-v1');
        win.localStorage.removeItem('etagi-raskleyka-layouts-v1');

        lastAction = 'profile.save';
        setField(win, doc, '#agentName', 'Анна Smoke');
        setField(win, doc, '#agentPhone', '+7 900 123-45-67');
        click(doc, '#saveProfileBtn');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('Профиль СПН сохранён'), 3000, 'профиль не сохранился');
        assert(win.localStorage.getItem('etagi-raskleyka-profile-v1')?.includes('Анна Smoke'), 'профиль отсутствует в localStorage');

        lastAction = 'profile.load';
        setField(win, doc, '#agentName', 'Временное имя');
        setField(win, doc, '#agentPhone', '+7 999 000-00-00');
        click(doc, '#loadProfileBtn');
        await waitFor(() => doc.getElementById('agentName')?.value === 'Анна Smoke' && doc.getElementById('agentPhone')?.value === '+7 900 123-45-67', 3000, 'профиль не восстановил имя и телефон');
        pass('profile: сохранение и загрузка');

        lastAction = 'layout.named-save';
        setField(win, doc, '#layoutName', 'Smoke именованный макет');
        setField(win, doc, '#headline', 'Заголовок именованного макета');
        setField(win, doc, '#area', 'Северный smoke');
        click(doc, '#saveNamedLayoutBtn');
        await waitFor(() => {
          const select = doc.getElementById('savedLayouts');
          return select?.value && select.options.length === 2 && doc.getElementById('statusLine')?.textContent.includes('сохранён');
        }, 3000, 'именованный макет не появился в списке');
        const namedLayoutId = doc.getElementById('savedLayouts').value;
        assert(namedLayoutId, 'именованный макет не получил id');
        assert(win.localStorage.getItem('etagi-raskleyka-layouts-v1')?.includes('Smoke именованный макет'), 'именованный макет отсутствует в localStorage');

        lastAction = 'layout.named-load';
        setField(win, doc, '#headline', 'Временный заголовок');
        setField(win, doc, '#area', 'Временный район');
        doc.getElementById('savedLayouts').value = namedLayoutId;
        click(doc, '#loadNamedLayoutBtn');
        await waitFor(() => doc.getElementById('headline')?.value === 'Заголовок именованного макета' && doc.getElementById('area')?.value === 'Северный smoke', 3000, 'именованный макет не восстановил поля');
        pass('именованные макеты: сохранение и загрузка');

        lastAction = 'layout.last-save';
        setField(win, doc, '#headline', 'Заголовок последнего макета');
        setField(win, doc, '#price', '3 500 000 ₽');
        click(doc, '#saveLocalBtn');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('Последний макет сохранён'), 3000, 'последний макет не сохранился');
        assert(win.localStorage.getItem('etagi-raskleyka-saved-v1')?.includes('Заголовок последнего макета'), 'последний макет отсутствует в localStorage');

        lastAction = 'layout.last-load';
        setField(win, doc, '#headline', 'Изменённый заголовок');
        setField(win, doc, '#price', '1 ₽');
        click(doc, '#loadLocalBtn');
        await waitFor(() => doc.getElementById('headline')?.value === 'Заголовок последнего макета' && doc.getElementById('price')?.value === '3 500 000 ₽', 3000, 'последний макет не восстановил поля');
        pass('последний макет: сохранение и загрузка');

        lastAction = 'object.clear';
        const objectValues = {
          layoutName:'Макет для очистки',
          area:'Южный smoke',
          propertyType:'Квартира',
          price:'4 200 000 ₽',
          params:'2 комнаты, 58 м²',
          headline:'Объект перед очисткой',
          description:'Описание объекта перед очисткой с подробностями.',
          benefits:'Тихий двор\nУдобный этаж',
          customBlockTitle:'Особое условие',
          customBlockText:'Текст дополнительного блока',
          qrLink:'https://example.com/smoke-clear-object',
          qrCaption:'Открыть объект'
        };
        for(const [id, value] of Object.entries(objectValues)) setField(win, doc, `#${id}`, value);
        setCheck(win, doc, '#showCustomBlock', true);
        setCheck(win, doc, '#showQr', true);
        doc.getElementById('savedLayouts').value = namedLayoutId;
        click(doc, '[data-block-move="down"][data-block-id="headline"]');
        await setFile(win, doc, '#photoOne', 'smoke-one.svg', '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="30"><rect width="40" height="30" fill="white"/></svg>');
        await setFile(win, doc, '#photoTwo', 'smoke-two.svg', '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="30"><rect width="40" height="30" fill="black"/></svg>');
        await waitFor(() => doc.querySelectorAll('#printSheet .photo-box img').length >= 2, 3000, 'два тестовых фото не появились в макете');
        assert(doc.querySelector('#printSheet .qr-row'), 'QR не появился перед очисткой');
        click(doc, '#clearObjectBtn');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('Данные объекта очищены'), 3000, 'очистка объекта не завершилась');

        const clearedIds = ['layoutName','area','propertyType','price','params','headline','description','benefits','customBlockTitle','customBlockText','qrLink','qrCaption'];
        assert(clearedIds.every(id => doc.getElementById(id)?.value === ''), 'после очистки остались объектные поля или QR');
        assert(doc.getElementById('agentName')?.value === 'Анна Smoke', 'очистка удалила имя СПН');
        assert(doc.getElementById('agentPhone')?.value === '+7 900 123-45-67', 'очистка удалила телефон СПН');
        assert(doc.getElementById('savedLayouts')?.value === '', 'после очистки остался выбран сохранённый макет');
        assert(doc.getElementById('showPhoto')?.checked === false, 'после очистки фото остаётся включённым');
        assert(doc.getElementById('showCustomBlock')?.checked === false, 'после очистки дополнительный блок остаётся включённым');
        assert(doc.querySelector('[data-photo="none"]')?.classList.contains('active'), 'после очистки не выбран режим без фото');
        assert(doc.getElementById('printSheet')?.classList.contains('sheet-photo-none'), 'предпросмотр не перешёл в режим без фото');
        assert(!doc.querySelector('#printSheet .photo-box img'), 'после очистки в макете осталось фото');
        assert(!doc.querySelector('#printSheet .qr-row'), 'после очистки в макете остался QR');
        assert(doc.querySelector('#blockOrderList [data-block-id]')?.dataset.blockId === 'headline', 'после очистки не восстановлен стандартный порядок блоков');
        pass('очистка объекта: данные, фото и QR удалены, профиль сохранён');

        lastAction = 'text.shorten-label';
        const shortenButton = doc.getElementById('makeShortBtn');
        assert(shortenButton?.textContent.trim() === 'Сократить описание', 'название команды не объясняет, какое поле изменяется');
        assert(shortenButton?.title.includes('только описание'), 'у команды нет пояснения о границах действия');
        pass('текст: название команды объясняет сокращение описания');

        lastAction = 'text.shorten-empty';
        const originalHeadline = 'Заголовок должен сохраниться';
        const originalBenefits = 'Преимущество не должно измениться';
        setField(win, doc, '#headline', originalHeadline);
        setField(win, doc, '#benefits', originalBenefits);
        setField(win, doc, '#description', '   ');
        setCheck(win, doc, '#showDescription', false);
        click(doc, '#makeShortBtn');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('сокращать пока нечего'), 1000, 'для пустого описания не показано объяснение');
        assert((doc.getElementById('description')?.value || '').trim() === '', 'пустое описание было неожиданно заполнено');
        assert(doc.getElementById('headline')?.value === originalHeadline, 'пустое сокращение изменило заголовок');
        assert(doc.getElementById('benefits')?.value === originalBenefits, 'пустое сокращение изменило преимущества');
        assert(doc.getElementById('showDescription')?.checked === false, 'пустое сокращение включило блок описания');
        assert(doc.activeElement?.id === 'description', 'после объяснения фокус не перешёл в описание');
        pass('текст: пустое описание получает объяснение и фокус');

        lastAction = 'text.shorten-already-short';
        const shortDescription = 'Короткое описание уже готово.';
        setField(win, doc, '#description', shortDescription);
        setCheck(win, doc, '#showDescription', false);
        click(doc, '#makeShortBtn');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('уже короче 190 символов'), 1000, 'для короткого описания не показан результат');
        assert(doc.getElementById('description')?.value === shortDescription, 'короткое описание было неожиданно изменено');
        assert(doc.getElementById('showDescription')?.checked === false, 'команда без изменений включила скрытое описание');
        pass('текст: готовое короткое описание не изменяется');

        lastAction = 'text.shorten-description';
        const longDescription = 'Просторная квартира с удобной планировкой, светлыми комнатами и спокойным двором. '.repeat(5).trim();
        assert(longDescription.length > 190, 'тестовое описание должно быть длиннее лимита');
        setField(win, doc, '#description', longDescription);
        setCheck(win, doc, '#showDescription', false);
        click(doc, '#makeShortBtn');
        await waitFor(() => {
          const value = doc.getElementById('description')?.value || '';
          return value.length > 0 && value.length <= 190 && value !== longDescription;
        }, 3000, 'описание не сократилось до лимита');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('Описание сокращено до 190 символов'), 1000, 'не показано подтверждение сокращения');
        const shortenedDescription = doc.getElementById('description').value;
        assert(shortenedDescription.endsWith('...'), 'сокращённое описание не завершено многоточием');
        assert(doc.getElementById('headline')?.value === originalHeadline, 'сокращение изменило заголовок');
        assert(doc.getElementById('benefits')?.value === originalBenefits, 'сокращение изменило преимущества');
        assert(doc.getElementById('showDescription')?.checked === true, 'сокращённое описание не включено в макете');
        assert(doc.querySelector('#printSheet .desc')?.textContent === shortenedDescription, 'предпросмотр не показывает сокращённое описание');
        pass('текст: сокращение описания до лимита');

        lastAction = 'text.strengthen-empty';
        setField(win, doc, '#description', '   ');
        setField(win, doc, '#benefits', 'Существующее преимущество');
        setCheck(win, doc, '#showDescription', false);
        setCheck(win, doc, '#showBenefits', false);
        click(doc, '#makeStrongerBtn');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('Сначала добавьте описание объекта'), 1000, 'для пустого описания не показано объяснение');
        assert((doc.getElementById('description')?.value || '').trim() === '', 'пустое описание было неожиданно заполнено');
        assert(doc.getElementById('benefits')?.value === 'Существующее преимущество', 'при пустом описании изменились преимущества');
        assert(doc.getElementById('showDescription')?.checked === false, 'при пустом описании включился блок описания');
        assert(doc.getElementById('showBenefits')?.checked === false, 'при пустом описании включился блок преимуществ');
        assert(doc.activeElement?.id === 'description', 'после объяснения фокус не перешёл в описание');
        pass('текст: пустое описание получает объяснение и фокус');

        lastAction = 'text.strengthen';
        setField(win, doc, '#description', 'Квартира готова к просмотру.');
        setField(win, doc, '#benefits', '');
        setCheck(win, doc, '#showDescription', false);
        setCheck(win, doc, '#showBenefits', false);
        click(doc, '#makeStrongerBtn');
        await waitFor(() => {
          const description = doc.getElementById('description')?.value || '';
          const benefits = doc.getElementById('benefits')?.value || '';
          return description.includes('Позвоните — подскажу детали и помогу разобраться.') && benefits.includes('Безопасное сопровождение');
        }, 3000, 'усиление не добавило призыв и преимущества');
        const strengthenedDescription = doc.getElementById('description').value;
        const strengthenedBenefits = doc.getElementById('benefits').value;
        assert(doc.getElementById('showDescription')?.checked === true, 'усиленное описание не включено');
        assert(doc.getElementById('showBenefits')?.checked === true, 'добавленные преимущества не включены');
        const flyers = [...doc.querySelectorAll('#printSheet .flyer')];
        assert(flyers.length > 0, 'в предпросмотре нет копий макета');
        assert(flyers.every(flyer => flyer.querySelectorAll('.benefits .benefit').length === 3), 'не в каждой копии макета показаны три преимущества');
        assert((strengthenedDescription.match(/Позвоните — подскажу детали и помогу разобраться\./g) || []).length === 1, 'призыв добавлен больше одного раза');
        click(doc, '#makeStrongerBtn');
        await waitFor(() => doc.getElementById('description')?.value === strengthenedDescription && doc.getElementById('benefits')?.value === strengthenedBenefits, 1000, 'повторное усиление изменило уже подготовленный текст');
        assert((doc.getElementById('description').value.match(/Позвоните — подскажу детали и помогу разобраться\./g) || []).length === 1, 'повторное усиление продублировало призыв');
        pass('текст: усиление добавляет призыв и преимущества без дублей');

        lastAction = 'layout.file-download';
        const exportedValues = {
          layoutName:'JSON smoke макет',
          agentName:'Ирина JSON',
          agentPhone:'+7 900 555-44-33',
          area:'Центр JSON',
          propertyType:'Дом',
          price:'6 750 000 ₽',
          params:'96 м², участок 8 соток',
          headline:'Экспортируемый заголовок',
          description:'Экспортируемое описание объекта.',
          benefits:'Проверенные документы\nУдобный подъезд',
          customBlockTitle:'',
          customBlockText:'',
          qrLink:'https://example.com/json-smoke',
          qrCaption:'Открыть JSON объект'
        };
        for(const [id, value] of Object.entries(exportedValues)) setField(win, doc, `#${id}`, value);
        setField(win, doc, '#contactCtaText', 'Позвоните по JSON-макету');
        setField(win, doc, '#tearOffLabel', 'Дом JSON');
        setField(win, doc, '#brandNameText', 'Этажи JSON');
        setField(win, doc, '#brandSideText', 'json.etagi.test');
        setCheck(win, doc, '#showQr', true);
        setCheck(win, doc, '#showCustomBlock', false);
        click(doc, '[data-count="4"]');
        click(doc, '[data-block-move="down"][data-block-id="headline"]');

        const downloadCapture = installDownloadCapture(win);
        click(doc, '#downloadBtn');
        await waitFor(() => downloadCapture.blob && downloadCapture.filename, 3000, 'экспорт не создал скачиваемый JSON');
        const exportedText = await downloadCapture.blob.text();
        const exportedState = JSON.parse(exportedText);
        downloadCapture.restore();
        assert(/^etagi-raskleyka-\d{4}-\d{2}-\d{2}\.json$/.test(downloadCapture.filename), 'имя экспортируемого файла имеет неверный формат');
        assert(downloadCapture.blob.type.includes('application/json'), 'экспортированный Blob имеет неверный MIME-тип');
        assert(exportedState.fileFormat === 'etagi-raskleyka-layout', 'экспорт не содержит идентификатор формата макета');
        assert(exportedState.fileFormatVersion === 1, 'экспорт не содержит версию формата макета');
        assert(exportedState.$schema === 'data/layout-file.schema.json', 'экспорт не содержит ссылку на схему');
        assert(!Number.isNaN(Date.parse(exportedState.exportedAt)), 'экспорт не содержит корректную дату');
        for(const [id, value] of Object.entries(exportedValues)) assert(exportedState[id] === value, `в экспортированном JSON неверное поле ${id}`);
        assert(exportedState.printCount === 4, 'экспорт не сохранил 4 копии на А4');
        assert(exportedState.blockOrder?.[0] === 'price', 'экспорт не сохранил изменённый порядок блоков');
        assert(exportedState.showQr === true && exportedState.showCustomBlock === false, 'экспорт не сохранил видимость QR и дополнительного блока');
        assert(exportedState.contactCta === 'Позвоните по JSON-макету', 'экспорт не содержит призыв блока контактов');
        assert(exportedState.tearOffLabel === 'Дом JSON', 'экспорт не содержит подпись отрывной полосы');
        assert(exportedState.brandName === 'Этажи JSON', 'экспорт не содержит название бренда');
        assert(exportedState.brandSideText === 'json.etagi.test', 'экспорт не содержит боковую подпись бренда');
        pass('JSON: экспорт Blob содержит состояние и служебные поля');

        lastAction = 'layout.file-open-trigger';
        let uploadTriggerClicks = 0;
        doc.getElementById('uploadFile').addEventListener('click', () => { uploadTriggerClicks += 1; }, {once:true});
        click(doc, '#uploadBtn');
        await waitFor(() => uploadTriggerClicks === 1, 1000, 'кнопка импорта не вызвала выбор JSON-файла');
        pass('JSON: кнопка импорта открывает выбор файла');

        lastAction = 'layout.file-import';
        setField(win, doc, '#layoutName', 'Чужой текущий макет');
        setField(win, doc, '#agentName', 'Чужое имя');
        setField(win, doc, '#agentPhone', '+7 999 999-99-99');
        setField(win, doc, '#headline', 'Чужой заголовок');
        setField(win, doc, '#price', '1 ₽');
        setField(win, doc, '#customBlockTitle', 'Чужой блок');
        setField(win, doc, '#customBlockText', 'Эти данные не должны смешаться');
        setField(win, doc, '#qrLink', 'https://example.com/current-state');
        setField(win, doc, '#contactCtaText', 'Чужой призыв');
        setField(win, doc, '#tearOffLabel', 'Чужая подпись');
        setField(win, doc, '#brandNameText', 'Чужой бренд');
        setField(win, doc, '#brandSideText', 'wrong.example');
        setCheck(win, doc, '#showCustomBlock', true);
        click(doc, '[data-count="1"]');
        doc.getElementById('savedLayouts').value = namedLayoutId;

        const stateBeforeInvalidImport = {
          layoutName:doc.getElementById('layoutName').value,
          headline:doc.getElementById('headline').value,
          price:doc.getElementById('price').value,
          customBlockText:doc.getElementById('customBlockText').value,
          savedLayout:doc.getElementById('savedLayouts').value
        };

        lastAction = 'layout.file-import-invalid-json';
        await setFile(win, doc, '#uploadFile', 'broken.json', '{broken', 'application/json');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('повреждён'), 2000, 'повреждённый JSON не получил понятную диагностику');
        assert(doc.getElementById('headline').value === stateBeforeInvalidImport.headline, 'повреждённый JSON заменил текущий заголовок');
        assert(doc.getElementById('savedLayouts').value === stateBeforeInvalidImport.savedLayout, 'повреждённый JSON сбросил выбранный сохранённый макет');

        lastAction = 'layout.file-import-foreign-json';
        await setFile(win, doc, '#uploadFile', 'foreign.json', JSON.stringify({foo:'bar'}), 'application/json');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('не похож на макет'), 2000, 'посторонний JSON не получил понятную диагностику');
        assert(doc.getElementById('layoutName').value === stateBeforeInvalidImport.layoutName, 'посторонний JSON заменил текущий макет');

        lastAction = 'layout.file-import-invalid-field';
        const invalidFieldText = JSON.stringify({...exportedState, printCount:'4'});
        await setFile(win, doc, '#uploadFile', 'invalid-field.json', invalidFieldText, 'application/json');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('Количество копий на А4'), 2000, 'ошибка типа поля не названа пользователю');
        assert(doc.getElementById('price').value === stateBeforeInvalidImport.price, 'JSON с неверным полем заменил текущую цену');
        assert(doc.getElementById('customBlockText').value === stateBeforeInvalidImport.customBlockText, 'JSON с неверным полем смешал данные');
        pass('JSON: ошибочные файлы отклоняются без замены макета');

        lastAction = 'layout.file-import';
        await setFile(win, doc, '#uploadFile', downloadCapture.filename, exportedText, 'application/json');
        await waitFor(() => doc.getElementById('statusLine')?.textContent.includes('Файл макета открыт без смешивания'), 4000, 'импорт JSON не завершился');
        await waitFor(() => doc.getElementById('contactCtaText')?.value === 'Позвоните по JSON-макету' && doc.getElementById('tearOffLabel')?.value === 'Дом JSON', 4000, 'служебные подписи не восстановились после импорта');

        for(const [id, value] of Object.entries(exportedValues)) assert(doc.getElementById(id)?.value === value, `импорт не восстановил поле ${id}`);
        assert(doc.getElementById('customBlockTitle')?.value === '' && doc.getElementById('customBlockText')?.value === '', 'импорт смешал отсутствующий дополнительный блок с текущими данными');
        assert(doc.getElementById('showCustomBlock')?.checked === false, 'импорт оставил включённым чужой дополнительный блок');
        assert(doc.getElementById('showQr')?.checked === true && doc.querySelector('#printSheet .qr-row'), 'импорт не восстановил QR');
        assert(doc.getElementById('savedLayouts')?.value === '', 'импорт не сбросил выбор сохранённого макета');
        assert(doc.querySelector('[data-count="4"]')?.classList.contains('active'), 'импорт не восстановил 4 копии на А4');
        assert(doc.querySelectorAll('#printSheet .flyer').length === 4, 'после импорта в предпросмотре не четыре копии');
        assert(doc.querySelector('#blockOrderList [data-block-id]')?.dataset.blockId === 'price', 'импорт не восстановил порядок блоков');
        assert(doc.getElementById('contactCtaText')?.value === 'Позвоните по JSON-макету', 'импорт не восстановил призыв контактов');
        assert(doc.getElementById('tearOffLabel')?.value === 'Дом JSON', 'импорт не восстановил подпись отрывной полосы');
        assert(doc.getElementById('brandNameText')?.value === 'Этажи JSON', 'импорт не восстановил название бренда');
        assert(doc.getElementById('brandSideText')?.value === 'json.etagi.test', 'импорт не восстановил боковую подпись бренда');
        pass('JSON: импорт восстанавливает макет без смешивания');

        if(runtimeErrors.length) throw new Error(`runtime errors: ${runtimeErrors.join(' | ')}`);
        lastAction = 'completed';
        result.dataset.status = 'passed';
        result.textContent = `PASSED\n${checks.map(item => `✓ ${item}`).join('\n')}`;
      }
      catch(error) {
        result.dataset.status = 'failed';
        result.dataset.lastAction = lastAction;
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ ${error.message || error}\nПоследнее действие: ${lastAction}\nСостояние: ${JSON.stringify(snapshot(doc))}`;
      }
    }, {once:true});

    frame.src = '/index.html?smoke=ui-actions';

    window.setTimeout(() => {
      if(result.dataset.status === 'pending'){
        result.dataset.status = 'failed';
        result.dataset.lastAction = lastAction;
        result.textContent = `FAILED\n${checks.map(item => `✓ ${item}`).join('\n')}\n✗ общий timeout UI actions smoke\nПоследнее действие: ${lastAction}`;
      }
    }, 38000);

    function pass(message){ checks.push(message); }
    function assert(condition, message){ if(!condition) throw new Error(message); }
    function click(doc, selector){
      const element = doc.querySelector(selector);
      assert(element, `не найден элемент ${selector}`);
      element.click();
    }
    function setField(win, doc, selector, value){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      input.value = value;
      input.dispatchEvent(new win.Event('input', {bubbles:true}));
      input.dispatchEvent(new win.Event('change', {bubbles:true}));
    }
    function setCheck(win, doc, selector, checked){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      input.checked = checked;
      input.dispatchEvent(new win.Event('change', {bubbles:true}));
    }
    async function setFile(win, doc, selector, name, content, type='image/svg+xml'){
      const input = doc.querySelector(selector);
      assert(input, `не найден элемент ${selector}`);
      const transfer = new win.DataTransfer();
      transfer.items.add(new win.File([content], name, {type}));
      input.files = transfer.files;
      input.dispatchEvent(new win.Event('change', {bubbles:true}));
      await waitFor(() => input.files?.length === 1, 1000, `файл ${name} не выбран`);
    }
    function installDownloadCapture(win){
      const originalCreateObjectURL = win.URL.createObjectURL;
      const originalRevokeObjectURL = win.URL.revokeObjectURL;
      const originalAnchorClick = win.HTMLAnchorElement.prototype.click;
      const capture = {blob:null, filename:'', href:''};
      win.URL.createObjectURL = blob => { capture.blob = blob; return 'blob:etagi-ui-actions-smoke'; };
      win.URL.revokeObjectURL = () => {};
      win.HTMLAnchorElement.prototype.click = function(){
        capture.filename = this.download || '';
        capture.href = this.href || '';
      };
      capture.restore = () => {
        win.URL.createObjectURL = originalCreateObjectURL;
        win.URL.revokeObjectURL = originalRevokeObjectURL;
        win.HTMLAnchorElement.prototype.click = originalAnchorClick;
      };
      return capture;
    }
    function snapshot(doc){
      const value = id => doc.getElementById(id)?.value || '';
      return {
        status:doc.getElementById('statusLine')?.textContent || '',
        agentName:value('agentName'),
        agentPhone:value('agentPhone'),
        layoutName:value('layoutName'),
        savedLayout:value('savedLayouts'),
        headline:value('headline'),
        area:value('area'),
        price:value('price'),
        description:value('description'),
        benefits:value('benefits'),
        customBlockText:value('customBlockText'),
        qrLink:value('qrLink'),
        contactCta:value('contactCtaText'),
        tearOffLabel:value('tearOffLabel'),
        showDescription:Boolean(doc.getElementById('showDescription')?.checked),
        showBenefits:Boolean(doc.getElementById('showBenefits')?.checked),
        showCustomBlock:Boolean(doc.getElementById('showCustomBlock')?.checked),
        photoMode:doc.querySelector('[data-photo].active')?.dataset.photo || '',
        printCount:doc.querySelector('[data-count].active')?.dataset.count || '',
        photoImages:doc.querySelectorAll('#printSheet .photo-box img').length,
        hasQr:Boolean(doc.querySelector('#printSheet .qr-row'))
      };
    }
    async function waitFor(predicate, timeout, message){
      const started = Date.now();
      while(Date.now() - started < timeout){
        if(predicate()) return;
        await new Promise(resolve => setTimeout(resolve, 80));
      }
      throw new Error(typeof message === 'function' ? message() : message);
    }
  </script>
</body>
